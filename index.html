<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Mapper Pro V13</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        :root { --accent: #222; --bg: #ffffff; --ui: rgba(255, 255, 255, 0.95); }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; background: #fff; }
        
        #labels { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        .label { position: absolute; font-size: 8px; font-weight: 700; color: #333; pointer-events: none; transform: translate(-50%, -50%); opacity: 0; transition: opacity 0.2s; white-space: nowrap; text-shadow: 0 0 2px #fff; }

        /* Unified Vertical Zoom Bar */
        .zoom-tray { position: fixed; right: 25px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 15px; background: var(--ui); padding: 20px 10px; border-radius: 40px; border: 1px solid #eee; z-index: 20; }
        #zoomRange { writing-mode: bt-lr; appearance: slider-vertical; width: 6px; height: 180px; accent-color: var(--accent); cursor: pointer; }

        /* V11 Style Panel */
        #panel { position: fixed; background: var(--ui); box-shadow: 0 0 40px rgba(0,0,0,0.1); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; z-index: 20; }
        @media (min-width: 769px) {
            #panel { left: 0; top: 0; width: 340px; height: 100%; transform: translateX(0); }
            #panel.closed { transform: translateX(-295px); }
            .handle { position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 45px; height: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
            .content { padding: 50px 35px; flex-grow: 1; display: flex; flex-direction: column; gap: 30px; overflow-y: auto; }
        }
        @media (max-width: 768px) {
            #panel { bottom: 0; left: 0; right: 0; border-radius: 24px 24px 0 0; transform: translateY(0); }
            #panel.closed { transform: translateY(calc(100% - 45px)); }
            .handle { height: 45px; width: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
            .content { padding: 0 25px 30px; max-height: 45vh; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 20px; }
            .section { flex: 1 1 140px; }
        }

        .section { display: flex; flex-direction: column; gap: 12px; }
        .section label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; color: #aaa; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        button { padding: 8px; border: 1px solid #ddd; background: #fff; border-radius: 6px; cursor: pointer; font-size: 10px; }
        ol { font-size: 12px; padding-left: 18px; column-count: 2; }
    </style>
</head>
<body>

<div id="labels"></div>
<div class="zoom-tray">
    <button onclick="zoomBtn(1.2)">+</button>
    <input type="range" id="zoomRange" min="6" max="25" step="0.1" value="15">
    <button onclick="zoomBtn(0.8)">-</button>
</div>

<div id="panel">
    <div class="handle" onclick="document.getElementById('panel').classList.toggle('closed')">
        <svg width="12" height="12" viewBox="0 0 10 10"><path d="M0 2 L10 2 L5 9 Z" fill="#999"/></svg>
    </div>
    <div class="content">
        <div class="section">
            <label>Settings</label>
            <div class="row">Labels <input type="checkbox" id="showLabels"></div>
            <div class="row">Highlight <input type="color" id="hlColor" value="#d4af37"></div>
        </div>
        <div class="section">
            <label>Selection</label>
            <ol id="sel-list"></ol>
        </div>
    </div>
</div>

<script>
    let state = { selected: new Set(), showLabels: false, registry: [] };
    let isDragging = false;
    let startPos = {x:0, y:0};

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true }); // No alpha for solid globe
    renderer.setClearColor(0xffffff, 1);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    const globe = new THREE.Group();
    scene.add(globe);

    async function init() {
        camera.position.z = 15;
        const data = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').then(r=>r.json());
        const features = topojson.feature(data, data.objects.countries).features;

        features.forEach(feat => {
            const group = new THREE.Group();
            const mat = new THREE.MeshBasicMaterial({ color: 0xf2f2f2, polygonOffset: true, polygonOffsetFactor: 1 });
            
            // Build geometry
            feat.geometry.coordinates.forEach(poly => {
                const coords = feat.geometry.type === "MultiPolygon" ? poly[0] : poly;
                // Use a simple triangulation approach
                const pts = coords.map(c => latLngToVec3(c[1], c[0], 5.01));
                const geo = new THREE.BufferGeometry().setFromPoints(pts);
                group.add(new THREE.Mesh(geo, mat.clone()));
            });

            group.userData = { name: feat.properties.name, centroid: getCentroid(feat.geometry.coordinates) };
            globe.add(group);
            state.registry.push({ group, name: feat.properties.name });
            
            const div = document.createElement('div');
            div.className = 'label';
            div.innerText = feat.properties.name;
            document.getElementById('labels').appendChild(div);
            group.userData.label = div;
        });
        animate();
    }

    function getCentroid(coords) {
        let lat=0, lng=0, count=0;
        const process = (c) => { lat += c[1]; lng += c[0]; count++; };
        coords.forEach(p => Array.isArray(p[0]) ? p[0].forEach(process) : process(p));
        return { lat: lat/count, lng: lng/count };
    }

    function latLngToVec3(lat, lng, r) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(-r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
    }

    function animate() {
        requestAnimationFrame(animate);
        
        state.registry.forEach(c => {
            if(!state.showLabels) { c.group.userData.label.style.opacity = 0; return; }
            const vec = latLngToVec3(c.group.userData.centroid.lat, c.group.userData.centroid.lng, 5.2);
            vec.project(camera);
            const dot = new THREE.Vector3().setFromSphericalCoords(5, (90-c.group.userData.centroid.lat)*Math.PI/180, (c.group.userData.centroid.lng+180)*Math.PI/180).applyQuaternion(globe.quaternion).dot(camera.getWorldDirection(new THREE.Vector3()));
            c.group.userData.label.style.opacity = dot > 0 ? 1 : 0;
            c.group.userData.label.style.left = `${(vec.x * 0.5 + 0.5) * window.innerWidth}px`;
            c.group.userData.label.style.top = `${(-vec.y * 0.5 + 0.5) * window.innerHeight}px`;
        });

        renderer.render(scene, camera);
        document.getElementById('zoomRange').value = camera.position.length();
    }

    // Input Handling
    window.addEventListener('pointerdown', (e) => { isDragging = false; startPos = {x:e.clientX, y:e.clientY}; });
    window.addEventListener('pointermove', (e) => { 
        if(Math.hypot(e.clientX - startPos.x, e.clientY - startPos.y) > 5) isDragging = true; 
    });
    window.addEventListener('pointerup', (e) => {
        if(isDragging || e.target.closest('#panel') || e.target.closest('.zoom-tray')) return;
        const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(globe.children, true);
        if(hits.length > 0) {
            const name = hits[0].object.parent.userData.name;
            state.selected.has(name) ? state.selected.delete(name) : state.selected.add(name);
            updateVisuals();
        }
    });

    function updateVisuals() {
        state.registry.forEach(c => {
            const sel = state.selected.has(c.name);
            c.group.children.forEach(m => m.material.color.set(sel ? document.getElementById('hlColor').value : 0xf2f2f2));
        });
        document.getElementById('sel-list').innerHTML = [...state.selected].sort().map(n => `<li>${n}</li>`).join('');
    }

    document.getElementById('showLabels').onchange = (e) => state.showLabels = e.target.checked;
    function zoomBtn(f) { camera.position.setLength(THREE.MathUtils.clamp(camera.position.length() * (1/f), 6, 25)); }
    document.getElementById('zoomRange').oninput = (e) => camera.position.setLength(e.target.value);
    window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };

    init();
</script>
</body>
</html>
