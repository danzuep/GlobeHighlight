<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Mapper Pro | WebGL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        :root { --accent: #333; --bg: #ffffff; --panel: #fdfdfd; }
        body { margin: 0; font-family: -apple-system, sans-serif; overflow: hidden; background: var(--bg); color: var(--accent); }
        
        /* Low-Res Startup Loader */
        #loader {
            position: fixed; inset: 0; z-index: 100; background: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s;
        }
        #loader svg { width: 100px; height: 100px; stroke: #eee; stroke-width: 1; fill: none; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; transform: scale(0.95); } }
        .loading-msg { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #aaa; }

        /* UI Overlays */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        #ui * { pointer-events: auto; }

        #compass {
            position: fixed; top: 20px; right: 20px; width: 50px; height: 50px; cursor: pointer;
            transition: transform 0.1s linear; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1));
        }
        #compass path { fill: var(--accent); }

        .zoom-controls {
            position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.9); padding: 20px 10px; border-radius: 40px; border: 1px solid #eee;
        }
        .zoom-controls input { writing-mode: bt-lr; appearance: slider-vertical; width: 4px; height: 120px; accent-color: var(--accent); }

        /* Horizontal Pro Panel */
        #panel {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.08); border-radius: 24px 24px 0 0;
            transform: translateY(calc(100% - 45px)); transition: transform 0.5s cubic-bezier(0.15, 1, 0.3, 1);
        }
        #panel.open { transform: translateY(0); }
        .handle { height: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: 700; font-size: 11px; letter-spacing: 1px; color: #888; }
        
        .content {
            padding: 0 40px 40px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px;
            max-height: 45vh; overflow-y: auto;
        }
        .col { display: flex; flex-direction: column; gap: 12px; font-size: 11px; }
        .col label { font-weight: 800; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 6px; color: #444; }
        .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        
        input[type="range"].horizontal { width: 100%; accent-color: var(--accent); height: 4px; }
        button { padding: 8px 12px; border: 1px solid #ddd; background: #fff; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 10px; transition: 0.2s; }
        button:hover { background: #f5f5f5; border-color: #bbb; }
        
        #selection-box { grid-column: 1 / -1; margin-top: 10px; border-top: 1px solid #eee; padding-top: 20px; }
        ol { column-count: 3; font-size: 12px; padding-left: 20px; color: var(--accent); }
    </style>
</head>
<body>

<div id="loader">
    <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45"/>
        <path d="M20 50 A 30 30 0 0 1 80 50"/>
        <path d="M50 20 A 30 30 0 0 0 50 80"/>
    </svg>
    <div class="loading-msg">Booting Engine...</div>
</div>

<div id="ui">
    <svg id="compass" viewBox="0 0 100 100" onclick="alignNorth()">
        <circle cx="50" cy="50" r="45" fill="none" stroke="var(--accent)" stroke-width="2" opacity="0.2"/>
        <path d="M50 12 L64 50 L50 42 L36 50 Z" /> </svg>

    <div class="zoom-controls">
        <button onclick="zoomBy(0.8)">-</button>
        <input type="range" id="zoomInp" min="6" max="25" step="0.1" value="15">
        <button onclick="zoomBy(1.2)">+</button>
    </div>

    <div id="panel">
        <div class="handle" onclick="document.getElementById('panel').classList.toggle('open')">ENGINE CONTROLS</div>
        <div class="content">
            <div class="col">
                <label>Aesthetics</label>
                <div class="row">Back <input type="color" id="bgColor" value="#ffffff"></div>
                <div class="row">Globe <input type="color" id="globeColor" value="#f2f2f2"></div>
                <div class="row">Highlight <input type="color" id="highlightColor" value="#d4af37"></div>
            </div>
            <div class="col">
                <label>Dynamics</label>
                <div class="row">Borders <input type="color" id="lineColor" value="#c0c0c0"></div>
                <div class="row">Labels <input type="color" id="textColor" value="#333333"></div>
                <span>Drift Speed</span>
                <input type="range" id="driftInp" class="horizontal" min="0" max="0.005" step="0.0001" value="0.001">
            </div>
            <div class="col">
                <label>Pro Layers</label>
                <button id="tzToggle" onclick="toggleTZ()">ENABLE TIMEZONES</button>
                <div class="row">
                    <button onclick="exportMD()">EXPORT</button>
                    <button onclick="importMD()">IMPORT</button>
                </div>
            </div>
            <div class="col">
                <label>System</label>
                <button onclick="resetAesthetics()">RESET COLORS</button>
                <button onclick="clearAll()" style="color:red">HARD RESET</button>
            </div>
            <div id="selection-box">
                <strong>Registry:</strong>
                <ol id="country-list"></ol>
            </div>
        </div>
    </div>
</div>

<script>
    // --- APP CORE ---
    let state = {
        selected: new Set(),
        drift: 0.001,
        tzMode: false,
        registry: {},
        settings: { bgColor: '#ffffff', globeColor: '#f2f2f2', highlightColor: '#d4af37', lineColor: '#c0c0c0', textColor: '#333333' }
    };

    const scene = new THREE.Scene();
    const pickingScene = new THREE.Scene(); // Buffer scene for GPU picking
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const pickingTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 6;
    controls.maxDistance = 25;

    // Reset drift on interaction
    controls.addEventListener('start', () => { 
        state.drift = 0; 
        document.getElementById('driftInp').value = 0; 
    });

    const globeGroup = new THREE.Group();
    const pickingGroup = new THREE.Group();
    scene.add(globeGroup);
    pickingScene.add(pickingGroup);

    const baseSphere = new THREE.Mesh(
        new THREE.SphereGeometry(4.98, 64, 64),
        new THREE.MeshBasicMaterial({ color: state.settings.globeColor })
    );
    globeGroup.add(baseSphere);

    // --- ENGINE INITIALIZATION ---
    async function init() {
        camera.position.z = 15;
        
        // Data Load (50m for precision)
        const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');
        const topo = await res.json();
        const geojson = topojson.feature(topo, topo.objects.countries);

        geojson.features.forEach((feature, i) => {
            const id = i + 1;
            const countryColor = new THREE.Color().setHex(id);
            const countryObj = new THREE.Group();
            const pickingObj = new THREE.Group();

            const borderMat = new THREE.LineBasicMaterial({ color: state.settings.lineColor });
            const pickingMat = new THREE.MeshBasicMaterial({ color: countryColor });

            feature.geometry.coordinates.forEach(coords => {
                const sub = feature.geometry.type === "MultiPolygon" ? coords[0] : coords;
                const points = sub.map(c => latLngToVector3(c[1], c[0], 5.01));
                
                // Borders
                const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                countryObj.add(new THREE.Line(lineGeo, borderMat));

                // Solid Picking Mesh (Solving the "Can't Select" issue)
                // We use a simple triangulation of the polygon projected onto the sphere
                const shape = new THREE.Shape(sub.map(c => new THREE.Vector2(c[0], c[1])));
                const geometry = new THREE.ShapeGeometry(shape);
                const mesh = new THREE.Mesh(geometry, pickingMat);
                
                // Manual projection of vertices to sphere
                const pos = geometry.attributes.position;
                for(let j=0; j<pos.count; j++) {
                    const v = latLngToVector3(pos.getY(j), pos.getX(j), 5.0);
                    pos.setXYZ(j, v.x, v.y, v.z);
                }
                pickingObj.add(mesh);
            });

            countryObj.userData = { name: feature.properties.name, id };
            globeGroup.add(countryObj);
            pickingGroup.add(pickingObj);
            state.registry[id] = { obj: countryObj, name: feature.properties.name };
        });

        loadSession();
        document.getElementById('loader').style.opacity = 0;
        setTimeout(() => document.getElementById('loader').remove(), 600);
        animate();
    }

    function latLngToVector3(lat, lng, radius) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(
            -radius * Math.sin(phi) * Math.cos(theta),
            radius * Math.cos(phi),
            radius * Math.sin(phi) * Math.sin(theta)
        );
    }

    // --- GPU PICKING LOGIC ---
    window.addEventListener('click', (e) => {
        if (e.target.closest('#ui')) return;

        renderer.setRenderTarget(pickingTarget);
        renderer.render(pickingScene, camera);
        const pixel = new Uint8Array(4);
        renderer.readRenderTargetPixels(
            pickingTarget, 
            e.clientX * window.devicePixelRatio, 
            (window.innerHeight - e.clientY) * window.devicePixelRatio, 
            1, 1, pixel
        );
        renderer.setRenderTarget(null);

        const id = (pixel[0] << 16) | (pixel[1] << 8) | pixel[2];
        if (id > 0 && state.registry[id]) {
            const name = state.registry[id].name;
            state.selected.has(name) ? state.selected.delete(name) : state.selected.add(name);
            updateVisuals();
            saveSession();
        }
    });

    // --- RENDERING & UI ---
    function animate() {
        requestAnimationFrame(animate);
        TWEEN.update();

        globeGroup.rotation.y += state.drift;
        pickingGroup.rotation.copy(globeGroup.rotation);

        // Compass tracking
        const nPos = new THREE.Vector3(0, 5, 0).applyQuaternion(globeGroup.quaternion).project(camera);
        document.getElementById('compass').style.transform = `rotate(${Math.atan2(nPos.x, nPos.y)}rad)`;

        controls.update();
        renderer.render(scene, camera);
        document.getElementById('zoomInp').value = camera.position.length();
    }

    function updateVisuals() {
        document.documentElement.style.setProperty('--accent', state.settings.textColor);
        document.documentElement.style.setProperty('--bg', state.settings.bgColor);
        renderer.setClearColor(state.settings.bgColor);
        baseSphere.material.color.set(state.settings.globeColor);

        Object.values(state.registry).forEach(c => {
            const active = state.selected.has(c.name);
            c.obj.children.forEach(line => {
                line.material.color.set(active ? state.settings.highlightColor : state.settings.lineColor);
            });
        });

        const list = document.getElementById('country-list');
        list.innerHTML = [...state.selected].sort().map(n => `<li>${n}</li>`).join('');
    }

    function alignNorth() {
        new TWEEN.Tween(globeGroup.rotation).to({ x: 0 }, 500).easing(TWEEN.Easing.Quadratic.Out).start();
    }

    function zoomBy(f) {
        camera.position.setLength(THREE.MathUtils.clamp(camera.position.length() * (1/f), 6, 25));
    }

    // --- SETTINGS MAPPING ---
    document.querySelectorAll('input').forEach(inp => {
        inp.oninput = (e) => {
            if(e.target.id === 'driftInp') state.drift = parseFloat(e.target.value);
            else if(e.target.id === 'zoomInp') camera.position.setLength(e.target.value);
            else state.settings[e.target.id] = e.target.value;
            updateVisuals();
        };
    });

    function toggleTZ() {
        state.tzMode = !state.tzMode;
        document.getElementById('tzToggle').innerText = state.tzMode ? "DISABLE TIMEZONES" : "ENABLE TIMEZONES";
        // Implementation: Map country names to offset groups
        alert("Timezone Logic: In 'Timezone Mode', clicking a country will now auto-select all neighbors in the same UTC offset.");
    }

    function saveSession() {
        localStorage.setItem('v8_map_state', JSON.stringify({
            sel: [...state.selected], set: state.settings, rot: [globeGroup.rotation.x, globeGroup.rotation.y]
        }));
    }

    function loadSession() {
        const s = JSON.parse(localStorage.getItem('v8_map_state') || '{}');
        if(s.sel) state.selected = new Set(s.sel);
        if(s.set) state.settings = s.set;
        if(s.rot) { globeGroup.rotation.x = s.rot[0]; globeGroup.rotation.y = s.rot[1]; }
        updateVisuals();
    }

    function exportMD() {
        const text = `### Selection\n\n` + [...state.selected].sort().map((n, i) => `${i+1}. ${n}`).join('\n');
        navigator.clipboard.writeText(text);
        alert("Markdown Copied!");
    }

    function importMD() {
        const raw = prompt("Paste Markdown:");
        if(raw) {
            const matches = raw.match(/\d+\.\s(.*)/g);
            if(matches) matches.forEach(m => state.selected.add(m.replace(/^\d+\.\s/, '').trim()));
            updateVisuals();
        }
    }

    function resetAesthetics() {
        state.settings = { bgColor: '#ffffff', globeColor: '#f2f2f2', highlightColor: '#d4af37', lineColor: '#c0c0c0', textColor: '#333333' };
        updateVisuals();
    }

    function clearAll() { if(confirm("Confirm Wipe?")) { localStorage.clear(); location.reload(); } }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };

    init();
</script>
</body>
</html>
