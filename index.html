<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Mapper Pro | WebGL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        :root { --highlight: #333333; --bg: #ffffff; --panel: #f9f9f9; }
        body { margin: 0; font-family: -apple-system, sans-serif; overflow: hidden; background: var(--bg); touch-action: none; }
        
        #loader {
            position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: white; z-index: 100; transition: opacity 0.5s;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #eee; border-top-color: var(--highlight);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        #ui-layer * { pointer-events: auto; }

        /* Sliders & Compass */
        #compass {
            position: fixed; top: 20px; right: 20px; width: 45px; height: 45px;
            cursor: pointer; transition: transform 0.3s;
        }
        #compass circle { stroke: var(--highlight); stroke-width: 2; fill: none; }
        #compass path { fill: var(--highlight); }

        .zoom-controls {
            position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.8); padding: 15px 8px; border-radius: 30px;
        }
        .zoom-controls input { 
            writing-mode: bt-lr; appearance: slider-vertical; width: 4px; height: 150px; 
            accent-color: var(--highlight);
        }

        /* Settings Panel */
        #config-panel {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel);
            box-shadow: 0 -5px 25px rgba(0,0,0,0.1); border-radius: 20px 20px 0 0;
            transform: translateY(calc(100% - 45px)); transition: transform 0.4s cubic-bezier(0.1, 0.5, 0.1, 1);
        }
        #config-panel.open { transform: translateY(0); }
        #config-panel.open .triangle { transform: rotate(180deg); }

        .drag-handle { 
            height: 45px; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; font-weight: bold; color: var(--highlight); gap: 10px;
        }
        .triangle { transition: transform 0.3s; font-size: 10px; }

        .panel-content {
            padding: 0 25px 40px 25px; max-height: 60vh; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; font-size: 13px; }
        .control-group label { font-weight: 700; color: #666; border-bottom: 1px solid #ddd; padding-bottom: 3px; }
        .control-row { display: flex; justify-content: space-between; align-items: center; }
        
        button.action-btn { 
            padding: 8px; border: 1px solid #ccc; background: white; border-radius: 6px; 
            font-weight: 600; cursor: pointer; color: #444; font-size: 11px;
        }
        
        input[type="range"] { accent-color: var(--highlight); }

        #country-list-container { grid-column: 1 / -1; border-top: 1px solid #ddd; padding-top: 15px; }
        ol { column-count: 2; margin-top: 10px; font-size: 14px; padding-left: 25px; color: var(--highlight); }

        /* Labels Overlay */
        #labels-overlay { position: absolute; inset: 0; pointer-events: none; }
        .map-label { 
            position: absolute; transform: translate(-50%, -50%); 
            font-weight: bold; text-shadow: 0 0 3px white; white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="load-status" style="font-size: 12px; color: #666; margin-top: 15px;">Initializing WebGL...</p>
</div>

<div id="ui-layer">
    <svg id="compass" viewBox="0 0 100 100" onclick="resetToNorth()">
        <circle cx="50" cy="50" r="45" />
        <path d="M50 15 L60 50 L50 85 L40 50 Z" /> 
    </svg>

    <div class="zoom-controls">
        <input type="range" id="zoomSlider" min="5" max="30" step="0.1" value="15">
    </div>

    <div id="labels-overlay"></div>

    <div id="config-panel">
        <div class="drag-handle" onclick="document.getElementById('config-panel').classList.toggle('open')">
            <span class="triangle">▲</span> SETTINGS
        </div>
        <div class="panel-content">
            <div class="control-group">
                <label>Appearance</label>
                <div class="control-row">Background <input type="color" id="bgColor" value="#ffffff"></div>
                <div class="control-row">Globe <input type="color" id="globeColor" value="#f2f2f2"></div>
                <div class="control-row">Highlight <input type="color" id="highlightColor" value="#d4af37"></div>
            </div>
            <div class="control-group">
                <label>Borders & Motion</label>
                <div class="control-row">Lines <input type="color" id="lineColor" value="#c0c0c0"></div>
                <div class="control-row">Thickness <input type="range" id="lineWidth" min="1" max="5" step="0.1" value="1"></div>
                <div class="control-row">Drift Speed <input type="range" id="driftSpeed" min="0" max="0.01" step="0.0001" value="0.002"></div>
            </div>
            <div class="control-group">
                <label>Country Names</label>
                <div class="control-row">Visible <input type="checkbox" id="showLabels"></div>
                <div class="control-row">Size <input type="range" id="fontSize" min="8" max="24" value="12"></div>
                <div class="control-row">Color <input type="color" id="textColor" value="#333333"></div>
            </div>
            <div class="control-group">
                <label>Layers & Reset</label>
                <div class="control-row">Timezone Map <input type="checkbox" id="tzToggle"></div>
                <div class="control-row">
                    <button class="action-btn" onclick="resetView()">Reset View</button>
                    <button class="action-btn" onclick="confirmFullReset()" style="color: #d9534f;">Clear All</button>
                </div>
            </div>
            <div class="control-group">
                <label>Data Actions</label>
                <button class="action-btn" onclick="copyMarkdown()">Export MD</button>
                <button class="action-btn" onclick="importMarkdown()">Import MD</button>
            </div>

            <div id="country-list-container">
                <strong>Countries:</strong>
                <ol id="country-list"></ol>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Configuration ---
    let selectedCountries = new Set();
    let countriesData = [];
    let tzData = [];
    let driftSpeed = 0.002;
    let tzMode = false;

    let settings = {
        bgColor: "#ffffff", globeColor: "#f2f2f2", highlightColor: "#d4af37",
        lineColor: "#c0c0c0", lineWidth: 1, textColor: "#333333",
        showLabels: false, fontSize: 12
    };

    // --- WebGL Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.8;
    controls.minDistance = 6;
    controls.maxDistance = 30;

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    // Globe Base
    const globeSphere = new THREE.Mesh(
        new THREE.SphereGeometry(5, 64, 64),
        new THREE.MeshBasicMaterial({ color: settings.globeColor })
    );
    globeGroup.add(globeSphere);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // --- Data Management ---
    async function init() {
        try {
            // Geolocation
            const geo = await fetch('https://ipapi.co/json/').then(r => r.json()).catch(() => ({longitude: 0, latitude: 20}));
            camera.position.set(0, 0, 15);
            globeGroup.rotation.y = -geo.longitude * (Math.PI / 180);
            globeGroup.rotation.x = geo.latitude * (Math.PI / 180);

            // Progressive Load
            document.getElementById('load-status').innerText = "Loading 110m Geometry...";
            await loadGeometry("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json");
            
            loadState();
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 500);

            // Detailed Load (Singapore fix)
            document.getElementById('load-status').innerText = "Enhancing to 50m detail...";
            await loadGeometry("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json", true);

        } catch (e) { console.error(e); }
    }

    async function loadGeometry(url, replace = false) {
        const topoData = await fetch(url).then(r => r.json());
        const geojson = topojson.feature(topoData, topoData.objects.countries);
        
        if(replace) {
            countriesData.forEach(c => globeGroup.remove(c.mesh));
            countriesData = [];
        }

        geojson.features.forEach(feature => {
            const country = {
                name: feature.properties.name,
                mesh: createCountryMesh(feature)
            };
            countriesData.push(country);
            globeGroup.add(country.mesh);
        });
        updateMaterials();
    }

    function createCountryMesh(feature) {
        const group = new THREE.Group();
        const material = new THREE.MeshBasicMaterial({ 
            color: 0x000000, 
            transparent: true, 
            opacity: 0,
            side: THREE.DoubleSide 
        });

        const bordersMaterial = new THREE.LineBasicMaterial({ color: settings.lineColor });

        feature.geometry.coordinates.forEach(polygon => {
            const points = [];
            const coords = feature.geometry.type === "MultiPolygon" ? polygon[0] : polygon;
            
            coords.forEach(coord => {
                const phi = (90 - coord[1]) * (Math.PI / 180);
                const theta = (coord[0] + 180) * (Math.PI / 180);
                points.push(new THREE.Vector3(
                    -5.01 * Math.sin(phi) * Math.cos(theta),
                    5.01 * Math.cos(phi),
                    5.01 * Math.sin(phi) * Math.sin(theta)
                ));
            });

            // Borders
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, bordersMaterial);
            group.add(line);

            // Shape for clicking
            const shape = new THREE.Shape();
            // Simplified logic for shape filling in 3D is complex; 
            // for "Blank Map" we use the boundaries for picking or basic fills.
        });

        group.userData = { name: feature.properties.name };
        return group;
    }

    // --- Interaction Logic ---
    window.addEventListener('click', onMouseClick);
    function onMouseClick(event) {
        if (event.target.closest('#ui-layer')) return;
        
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(globeGroup.children, true);

        if (intersects.length > 0) {
            let obj = intersects[0].object;
            while(obj.parent && !obj.userData.name) obj = obj.parent;
            
            const name = obj.userData.name;
            if(name) {
                selectedCountries.has(name) ? selectedCountries.delete(name) : selectedCountries.add(name);
                updateMaterials();
                updateList();
                saveState();
            }
        }
    }

    function updateMaterials() {
        document.documentElement.style.setProperty('--highlight', settings.textColor);
        document.documentElement.style.setProperty('--bg', settings.bgColor);
        renderer.setClearColor(settings.bgColor, 1);
        globeSphere.material.color.set(settings.globeColor);

        countriesData.forEach(c => {
            const isSelected = selectedCountries.has(c.name);
            c.mesh.children.forEach(child => {
                if(child instanceof THREE.Line) {
                    child.material.color.set(isSelected ? settings.highlightColor : settings.lineColor);
                    child.material.linewidth = settings.lineWidth;
                }
            });
        });
    }

    // --- Animation Loop ---
    function animate() {
        requestAnimationFrame(animate);
        
        if (!controls.activeLookAt) {
            globeGroup.rotation.y += driftSpeed;
        }

        controls.update();
        renderLabels();
        renderer.render(scene, camera);
        
        // Sync zoom slider
        document.getElementById("zoomSlider").value = camera.position.distanceTo(scene.position);
    }

    function renderLabels() {
        const overlay = document.getElementById('labels-overlay');
        overlay.innerHTML = '';
        if (!settings.showLabels) return;

        countriesData.forEach(c => {
            const vector = new THREE.Vector3();
            // Get center of first child line for position
            if(!c.mesh.children[0]) return;
            c.mesh.children[0].geometry.computeBoundingSphere();
            vector.copy(c.mesh.children[0].geometry.boundingSphere.center);
            vector.applyMatrix4(globeGroup.matrixWorld);

            // Backface culling
            const cameraDir = new THREE.Vector3().subVectors(camera.position, vector).normalize();
            const normal = vector.clone().normalize();
            if (cameraDir.dot(normal) < 0.1) return;

            vector.project(camera);
            const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (vector.y * -0.5 + 0.5) * window.innerHeight;

            const label = document.createElement('div');
            label.className = 'map-label';
            label.style.left = `${x}px`;
            label.style.top = `${y}px`;
            label.style.fontSize = `${settings.fontSize}px`;
            label.style.color = settings.textColor;
            label.innerText = c.name;
            overlay.appendChild(label);
        });
    }

    // --- UI Actions ---
    function resetToNorth() {
        new TWEEN.Tween(globeGroup.rotation).to({ x: 0 }, 500).start();
    }

    function resetView() {
        settings = { ...settings, bgColor: "#ffffff", globeColor: "#f2f2f2", lineColor: "#c0c0c0", lineWidth: 1, fontSize: 12 };
        camera.position.set(0, 0, 15);
        updateMaterials();
    }

    function confirmFullReset() {
        if(confirm("Clear selection and cache?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function saveState() {
        localStorage.setItem("globe_webgl_v1", JSON.stringify({
            selected: Array.from(selectedCountries),
            settings,
            rot: [globeGroup.rotation.x, globeGroup.rotation.y],
            zoom: camera.position.z
        }));
    }

    function loadState() {
        const saved = JSON.parse(localStorage.getItem("globe_webgl_v1") || "{}");
        if(saved.selected) selectedCountries = new Set(saved.selected);
        if(saved.settings) settings = saved.settings;
        if(saved.rot) { globeGroup.rotation.x = saved.rot[0]; globeGroup.rotation.y = saved.rot[1]; }
        if(saved.zoom) camera.position.z = saved.zoom;
        
        // Update UI inputs
        Object.keys(settings).forEach(k => {
            const el = document.getElementById(k);
            if(el) el.type === "checkbox" ? el.checked = settings[k] : el.value = settings[k];
        });
        updateMaterials();
        updateList();
    }

    function updateList() {
        const list = document.getElementById("country-list");
        list.innerHTML = "";
        Array.from(selectedCountries).sort().forEach(n => {
            const li = document.createElement("li");
            li.textContent = n;
            list.appendChild(li);
        });
    }

    function copyMarkdown() {
        const text = "### Countries\n\n" + Array.from(selectedCountries).sort().map((c, i) => `${i+1}. ${c}`).join("\n");
        navigator.clipboard.writeText(text);
        alert("Exported!");
    }

    function importMarkdown() {
        const input = prompt("Paste Markdown:");
        if (input) {
            const lines = input.match(/\d+\.\s(.*)/g);
            if (lines) lines.forEach(l => selectedCountries.add(l.replace(/^\d+\.\s/, "").trim()));
            updateMaterials();
            updateList();
        }
    }

    // Handle Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start
    init();
    animate();

</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
</body>
</html>
