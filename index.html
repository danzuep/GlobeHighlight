<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Mapper Pro V24</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        :root { --accent: #111; --bg: #ffffff; --ui: rgba(255, 255, 255, 0.98); }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; background: #fff; }
        
        #labels { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        .label { position: absolute; font-size: 10px; font-weight: 800; color: #222; pointer-events: none; transform: translate(-50%, -50%); opacity: 0; text-shadow: 0 0 4px #fff; }

        .zoom-tray { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 12px; background: var(--ui); padding: 15px 10px; border-radius: 40px; border: 1px solid #ddd; z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        #zoomRange { appearance: slider-vertical; width: 6px; height: 180px; accent-color: var(--accent); cursor: pointer; }

        #panel { position: fixed; background: var(--ui); box-shadow: 0 0 40px rgba(0,0,0,0.12); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; z-index: 200; border: 1px solid #eee; }
        
        @media (min-width: 769px) {
            #panel { left: 0; top: 0; width: 340px; height: 100%; transform: translateX(0); }
            #panel.closed { transform: translateX(-340px); }
            .handle { position: absolute; left: 100%; top: 50%; transform: translateY(-50%); width: 42px; height: 80px; background: var(--ui); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #eee; border-left: none; border-radius: 0 12px 12px 0; }
            #panel.closed .handle svg { transform: rotate(180deg); }
            .content { padding: 40px 30px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 25px; }
        }

        @media (max-width: 768px) {
            #panel { bottom: 0; left: 0; right: 0; border-radius: 24px 24px 0 0; transform: translateY(0); }
            #panel.closed { transform: translateY(calc(100% - 50px)); }
            .handle { height: 50px; width: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
            #panel.closed .handle svg { transform: rotate(180deg); }
            .content { padding: 0 24px 30px; max-height: 50vh; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 18px; }
            .section { flex: 1 1 140px; }
        }

        .section { display: flex; flex-direction: column; gap: 10px; }
        .section label { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #bbb; letter-spacing: 1.5px; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
        .row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 600; }
        
        .btn-group { display: flex; gap: 5px; }
        button { flex: 1; padding: 10px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 700; transition: 0.2s; }
        button:active { background: #f0f0f0; }
        button.primary { background: var(--accent); color: #fff; border: none; }

        ol { font-size: 11px; padding-left: 18px; column-count: 2; margin: 0; line-height: 1.6; color: #444; }
        input[type="color"] { border: none; width: 22px; height: 22px; cursor: pointer; background: none; }
    </style>
</head>
<body>

<div id="labels"></div>
<div class="zoom-tray">
    <button onclick="zoomStep(1.2)">+</button>
    <input type="range" id="zoomRange" min="6" max="25" step="0.1" value="15">
    <button onclick="zoomStep(0.8)">-</button>
</div>

<div id="panel">
    <div class="handle" onclick="document.getElementById('panel').classList.toggle('closed')">
        <svg width="12" height="12" viewBox="0 0 10 10" style="transition:0.3s"><path d="M2 2 L8 5 L2 8 Z" fill="#999"/></svg>
    </div>
    <div class="content">
        <div class="section">
            <label>Styles</label>
            <div class="row">Back <input type="color" id="cfgBg" value="#ffffff"></div>
            <div class="row">Ocean <input type="color" id="cfgOcean" value="#f2f2f2"></div>
            <div class="row">Select <input type="color" id="cfgHl" value="#d4af37"></div>
            <div class="row">Labels <input type="checkbox" id="cfgLabels"></div>
        </div>
        
        <div class="section">
            <label>Clipboard</label>
            <div class="btn-group">
                <button onclick="copySelection()">Copy</button>
                <button onclick="pasteSelection()">Paste</button>
            </div>
            <button class="primary" onclick="state.selected.clear(); redrawWorld();">Clear All</button>
        </div>

        <div class="section" style="width:100%">
            <label>Selected (<span id="sel-count">0</span>)</label>
            <ol id="sel-list"></ol>
        </div>
    </div>
</div>

<script>
    const state = { selected: new Set(), labels: false, drift: 0.0006, features: [], registry: [] };
    const W = 4096, H = 2048;
    
    // Canvases
    const mainCanvas = document.createElement('canvas');
    mainCanvas.width = W; mainCanvas.height = H;
    const ctx = mainCanvas.getContext('2d', { alpha: false });

    const idCanvas = document.createElement('canvas');
    idCanvas.width = W; idCanvas.height = H;
    const idCtx = idCanvas.getContext('2d', { alpha: false });

    let dragStart = { x: 0, y: 0 }, isDragging = false;

    // --- THREE.JS ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 6;
    controls.maxDistance = 25;
    controls.addEventListener('start', () => state.drift = 0);

    const globeTex = new THREE.CanvasTexture(mainCanvas);
    globeTex.minFilter = THREE.LinearFilter;
    const globe = new THREE.Mesh(
        new THREE.SphereGeometry(5, 128, 128),
        new THREE.MeshBasicMaterial({ map: globeTex })
    );
    scene.add(globe);

    // --- CORE LOGIC ---
    async function init() {
        camera.position.z = 15;
        if (window.innerWidth <= 768) document.getElementById('panel').classList.add('closed');

        const data = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').then(r=>r.json());
        state.features = topojson.feature(data, data.objects.countries).features;

        state.features.forEach((f, i) => {
            const lbl = document.createElement('div');
            lbl.className = 'label';
            lbl.innerText = f.properties.name;
            document.getElementById('labels').appendChild(lbl);
            
            // Smarter centroid for labels (bbox center)
            const coords = f.geometry.type === "MultiPolygon" ? f.geometry.coordinates[0][0] : f.geometry.coordinates[0];
            let minX=180, maxX=-180, minY=90, maxY=-90;
            coords.forEach(p => { minX=Math.min(minX, p[0]); maxX=Math.max(maxX, p[0]); minY=Math.min(minY, p[1]); maxY=Math.max(maxY, p[1]); });
            state.registry.push({ name: f.properties.name, label: lbl, lon: (minX+maxX)/2, lat: (minY+maxY)/2 });
        });

        drawIDMap();
        redrawWorld();
        animate();
    }

    function getXY(lon, lat) {
        return [(lon + 180) * (W / 360), (90 - lat) * (H / 180)];
    }

    function drawPath(targetCtx, feat) {
        targetCtx.beginPath();
        const multi = feat.geometry.type === "MultiPolygon" ? feat.geometry.coordinates : [feat.geometry.coordinates];
        multi.forEach(poly => {
            poly.forEach(ring => {
                for (let i = 0; i < ring.length; i++) {
                    const [x, y] = getXY(ring[i][0], ring[i][1]);
                    if (i === 0) targetCtx.moveTo(x, y);
                    else {
                        // Anti-Seam Logic: Don't draw lines across the texture if X jumps > 50% of width
                        const [prevX] = getXY(ring[i-1][0], ring[i-1][1]);
                        if (Math.abs(x - prevX) < W/2) targetCtx.lineTo(x, y);
                        else targetCtx.moveTo(x, y);
                    }
                }
            });
        });
        targetCtx.fill();
        targetCtx.stroke();
    }

    function drawIDMap() {
        idCtx.fillStyle = '#ffffff';
        idCtx.fillRect(0, 0, W, H);
        state.features.forEach((f, i) => {
            const id = i + 1;
            idCtx.fillStyle = `rgb(${id & 0xFF}, ${(id >> 8) & 0xFF}, ${(id >> 16) & 0xFF})`;
            idCtx.strokeStyle = idCtx.fillStyle;
            idCtx.lineWidth = 1;
            drawPath(idCtx, f);
        });
    }

    function redrawWorld() {
        const ocn = document.getElementById('cfgOcean').value;
        const hlc = document.getElementById('cfgHl').value;
        renderer.setClearColor(document.getElementById('cfgBg').value);

        ctx.fillStyle = ocn;
        ctx.fillRect(0, 0, W, H);

        state.features.forEach((f) => {
            const isSel = state.selected.has(f.properties.name);
            ctx.fillStyle = isSel ? hlc : "#e0e0e0";
            ctx.strokeStyle = "#bbb";
            ctx.lineWidth = 0.8;
            drawPath(ctx, f);
        });

        globeTex.needsUpdate = true;
        document.getElementById('sel-list').innerHTML = [...state.selected].sort().map(n => `<li>${n}</li>`).join('');
        document.getElementById('sel-count').innerText = state.selected.size;
    }

    function animate() {
        requestAnimationFrame(animate);
        globe.rotation.y += state.drift * (camera.position.length() / 20);
        controls.update();

        const camPos = camera.position.clone();
        state.registry.forEach(c => {
            if(!state.labels) { c.label.style.opacity = 0; return; }
            const v = latLngToVec3(c.lat, c.lon, 5.05).applyMatrix4(globe.matrixWorld);
            const dot = v.clone().normalize().dot(camPos.clone().normalize());
            
            if (dot > 0.3) {
                v.project(camera);
                c.label.style.opacity = 1;
                c.label.style.left = `${(v.x * 0.5 + 0.5) * window.innerWidth}px`;
                c.label.style.top = `${(-v.y * 0.5 + 0.5) * window.innerHeight}px`;
            } else { c.label.style.opacity = 0; }
        });
        renderer.render(scene, camera);
        document.getElementById('zoomRange').value = camera.position.length();
    }

    function latLngToVec3(lat, lng, r) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(-r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
    }

    // --- CLIPBOARD ---
    function copySelection() {
        const data = JSON.stringify([...state.selected]);
        navigator.clipboard.writeText(data);
        alert("Selection copied to clipboard!");
    }

    async function pasteSelection() {
        try {
            const text = await navigator.clipboard.readText();
            const list = JSON.parse(text);
            if (Array.isArray(list)) {
                state.selected = new Set(list);
                redrawWorld();
            }
        } catch (e) { alert("Invalid clipboard data."); }
    }

    // --- INPUTS ---
    window.addEventListener('pointerdown', e => { dragStart = {x:e.clientX, y:e.clientY}; isDragging = false; });
    window.addEventListener('pointermove', e => { if(Math.hypot(e.clientX-dragStart.x, e.clientY-dragStart.y) > 8) isDragging = true; });
    window.addEventListener('pointerup', e => {
        if (isDragging || e.target.closest('#panel') || e.target.closest('.zoom-tray')) return;

        const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
        const ray = new THREE.Raycaster();
        ray.setFromCamera(mouse, camera);
        
        const hits = ray.intersectObject(globe);
        if (hits.length > 0 && hits[0].uv) {
            const uv = hits[0].uv;
            const x = Math.floor(uv.x * W);
            const y = Math.floor((1 - uv.y) * H);
            const p = idCtx.getImageData(x, y, 1, 1).data;
            const id = p[0] + (p[1] << 8) + (p[2] << 16) - 1;

            if (id >= 0 && id < state.features.length) {
                const name = state.features[id].properties.name;
                state.selected.has(name) ? state.selected.delete(name) : state.selected.add(name);
                redrawWorld();
            }
        }
    });

    function zoomStep(f) { 
        const newLen = THREE.MathUtils.clamp(camera.position.length() * (1/f), 6, 25);
        camera.position.setLength(newLen);
    }
    document.getElementById('zoomRange').oninput = (e) => camera.position.setLength(e.target.value);
    document.getElementById('cfgLabels').onchange = (e) => state.labels = e.target.checked;
    document.querySelectorAll('input[type="color"]').forEach(i => i.oninput = redrawWorld);
    window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };

    init();
</script>
</body>
</html>
