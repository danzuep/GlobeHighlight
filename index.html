<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Mapper | Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        :root { --highlight: #333; --bg: #fff; --panel: #f9f9f9; }
        body { margin: 0; font-family: -apple-system, sans-serif; overflow: hidden; background: var(--bg); touch-action: none; }
        #loader { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; z-index: 100; transition: opacity 0.5s; }
        .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: var(--highlight); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* UI */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        #ui * { pointer-events: auto; }

        #compass-container { position: fixed; top: 20px; right: 20px; width: 60px; height: 60px; cursor: pointer; }
        #compass-svg { width: 100%; height: 100%; transition: transform 0.1s linear; }

        .zoom-controls { position: fixed; right: 25px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 15px; background: rgba(255,255,255,0.9); padding: 20px 10px; border-radius: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input[type="range"] { writing-mode: bt-lr; appearance: slider-vertical; width: 5px; height: 160px; accent-color: var(--highlight); }

        #config-panel { position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel); border-radius: 24px 24px 0 0; transform: translateY(calc(100% - 45px)); transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1); box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
        #config-panel.open { transform: translateY(0); }
        .drag-handle { height: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; color: var(--highlight); }
        .panel-content { padding: 0 25px 40px; max-height: 60vh; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; font-size: 13px; }
        .control-group label { font-weight: 700; color: #666; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        button { padding: 8px; border: 1px solid #ccc; background: #fff; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600; }
        ol { column-count: 2; font-size: 13px; padding-left: 20px; color: var(--highlight); }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="status" style="margin-top:15px; font-size:12px; color:#999;">Initializing GPU...</p>
</div>

<div id="ui">
    <div id="compass-container" onclick="resetView()">
        <svg id="compass-svg" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="none" stroke="var(--highlight)" stroke-width="2" />
            <path d="M50 15 L60 50 L50 85 L40 50 Z" fill="var(--highlight)" /> </svg>
    </div>

    <div class="zoom-controls">
        <button onclick="zoomStep(0.8)">-</button>
        <input type="range" id="zoomSlider" min="6" max="30" step="0.01">
        <button onclick="zoomStep(1.2)">+</button>
    </div>

    <div id="config-panel">
        <div class="drag-handle" onclick="this.parentElement.classList.toggle('open')">▼ SETTINGS</div>
        <div class="panel-content">
            <div class="control-group">
                <label>Theme</label>
                Background <input type="color" id="bgColor" value="#ffffff">
                Globe <input type="color" id="globeColor" value="#f2f2f2">
                Selection <input type="color" id="highlightColor" value="#d4af37">
            </div>
            <div class="control-group">
                <label>Engine</label>
                Lines <input type="color" id="lineColor" value="#c0c0c0">
                Drift <input type="range" id="driftSpeed" min="0" max="0.005" step="0.0001" value="0.001">
                Names <input type="color" id="textColor" value="#333333">
            </div>
            <div class="control-group">
                <label>Layers</label>
                <button onclick="toggleTz()">Timezone Map: <span id="tzStat">OFF</span></button>
                <button onclick="copyMD()">Export List</button>
                <button onclick="importMD()">Import List</button>
            </div>
            <div class="control-group">
                <label>Reset</label>
                <button onclick="resetSettings()">Reset Aesthetics</button>
                <button onclick="hardReset()" style="color:red">Wipe Data & Cache</button>
            </div>
            <div id="list-box" style="grid-column: 1/-1">
                <strong>Countries:</strong>
                <ol id="country-list"></ol>
            </div>
        </div>
    </div>
</div>

<script id="worker-code" type="javascript/worker">
    // Web Worker for Geometry Processing
    self.onmessage = async function(e) {
        const { url, type } = e.data;
        const resp = await fetch(url);
        const data = await resp.json();
        self.postMessage({ type, data });
    };
</script>

<script>
    // --- APP STATE ---
    let state = {
        selected: new Set(),
        tzActive: false,
        drift: 0.001,
        settings: {
            bgColor: '#ffffff', globeColor: '#f2f2f2', highlightColor: '#d4af37',
            lineColor: '#c0c0c0', textColor: '#333333'
        }
    };

    // --- ENGINE SETUP ---
    const scene = new THREE.Scene();
    const pickingScene = new THREE.Scene(); // Invisible scene for GPU picking
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const pickingTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 6;
    controls.maxDistance = 30;

    // Reset drift on user interaction
    controls.addEventListener('start', () => {
        state.drift = 0;
        document.getElementById('driftSpeed').value = 0;
    });

    const globeGroup = new THREE.Group();
    const pickingGroup = new THREE.Group();
    scene.add(globeGroup);
    pickingScene.add(pickingGroup);

    // Globe base (Shader Material)
    const globeMat = new THREE.MeshBasicMaterial({ color: state.settings.globeColor });
    const globeSphere = new THREE.Mesh(new THREE.SphereGeometry(5, 64, 64), globeMat);
    globeGroup.add(globeSphere);

    // Geometry data containers
    let countryRegistry = []; 

    // --- WORKER INITS ---
    const blob = new Blob([document.getElementById('worker-code').textContent], { type: 'text/javascript' });
    const worker = new Worker(window.URL.createObjectURL(blob));

    async function init() {
        // 1. Geolocation
        const geo = await fetch('https://ipapi.co/json/').then(r => r.json()).catch(() => ({}));
        camera.position.set(0, 0, 15);
        if(geo.longitude) {
            globeGroup.rotation.y = THREE.MathUtils.degToRad(-geo.longitude);
            globeGroup.rotation.x = THREE.MathUtils.degToRad(geo.latitude);
        }

        // 2. Load Geometry
        worker.postMessage({ type: 'countries', url: 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json' });
        
        loadSession();
        animate();
    }

    worker.onmessage = function(e) {
        const { type, data } = e.data;
        if (type === 'countries') {
            const geojson = topojson.feature(data, data.objects.countries);
            processGeometry(geojson.features);
            document.getElementById('loader').style.opacity = 0;
            setTimeout(() => document.getElementById('loader').remove(), 500);
        }
    };

    function processGeometry(features) {
        features.forEach((feature, index) => {
            const id = index + 1; // 0 is background
            const colorId = new THREE.Color().setHex(id);
            
            const group = new THREE.Group();
            const pickGroup = new THREE.Group();

            const borderMat = new THREE.LineBasicMaterial({ color: state.settings.lineColor });
            const pickMat = new THREE.MeshBasicMaterial({ color: colorId });

            // Using BufferGeometry for performance
            feature.geometry.coordinates.forEach(coords => {
                const subCoords = feature.geometry.type === "MultiPolygon" ? coords[0] : coords;
                const points = [];
                subCoords.forEach(c => {
                    const p = latLngToVector3(c[1], c[0], 5.01);
                    points.push(p);
                });

                const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(lineGeo, borderMat);
                group.add(line);

                // Picking volumes (Simplified spheres at centroids for tiny countries like Singapore)
                // This ensures Singapore is 100% clickable even if borders are 1px
                const pickSphere = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), pickMat);
                pickSphere.position.copy(latLngToVector3(getCentroid(subCoords)[1], getCentroid(subCoords)[0], 5.01));
                pickGroup.add(pickSphere);
            });

            group.userData = { name: feature.properties.name, id: id };
            globeGroup.add(group);
            pickingGroup.add(pickGroup);
            countryRegistry[id] = { group, feature };
        });
        updateVisuals();
    }

    // --- CORE LOGIC ---

    function latLngToVector3(lat, lng, radius) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(
            -radius * Math.sin(phi) * Math.cos(theta),
            radius * Math.cos(phi),
            radius * Math.sin(phi) * Math.sin(theta)
        );
    }

    function getCentroid(pts) {
        let x = 0, y = 0;
        pts.forEach(p => { x += p[0]; y += p[1]; });
        return [x / pts.length, y / pts.length];
    }

    function onPointerDown(event) {
        if(event.target.closest('#ui')) return;

        // GPU Picking Logic
        renderer.setRenderTarget(pickingTarget);
        renderer.render(pickingScene, camera);
        
        const pixel = new Uint8Array(4);
        renderer.readRenderTargetPixels(
            pickingTarget,
            event.clientX * window.devicePixelRatio,
            (window.innerHeight - event.clientY) * window.devicePixelRatio,
            1, 1, pixel
        );
        renderer.setRenderTarget(null);

        const id = (pixel[0] << 16) | (pixel[1] << 8) | (pixel[2]);
        if(id > 0 && countryRegistry[id]) {
            const name = countryRegistry[id].group.userData.name;
            state.selected.has(name) ? state.selected.delete(name) : state.selected.add(name);
            updateVisuals();
            saveSession();
        }
    }

    window.addEventListener('click', onPointerDown);

    function updateVisuals() {
        document.documentElement.style.setProperty('--highlight', state.settings.textColor);
        document.documentElement.style.setProperty('--bg', state.settings.bgColor);
        renderer.setClearColor(state.settings.bgColor);
        globeMat.color.set(state.settings.globeColor);

        countryRegistry.forEach(c => {
            const active = state.selected.has(c.group.userData.name);
            c.group.children.forEach(l => {
                l.material.color.set(active ? state.settings.highlightColor : state.settings.lineColor);
            });
        });

        const list = document.getElementById('country-list');
        list.innerHTML = [...state.selected].sort().map(n => `<li>${n}</li>`).join('');
    }

    function animate() {
        requestAnimationFrame(animate);
        
        // Drift
        globeGroup.rotation.y += state.drift;
        pickingGroup.rotation.copy(globeGroup.rotation);

        // Compass Tracking (Tracks North Pole)
        const northVec = new THREE.Vector3(0, 5, 0).applyQuaternion(globeGroup.quaternion).project(camera);
        const angle = Math.atan2(northVec.x, northVec.y);
        document.getElementById('compass-svg').style.transform = `rotate(${angle}rad)`;

        controls.update();
        renderer.render(scene, camera);
        
        // Slider Sync
        document.getElementById('zoomSlider').value = camera.position.distanceTo(scene.position);
    }

    // --- UI ACTIONS ---

    function resetView() {
        state.drift = 0.001;
        document.getElementById('driftSpeed').value = 0.001;
        new TWEEN.Tween(globeGroup.rotation).to({x: 0, y: globeGroup.rotation.y}, 600).easing(TWEEN.Easing.Quadratic.Out).start();
    }

    function zoomStep(factor) {
        const newDist = camera.position.distanceTo(scene.position) * (1/factor);
        camera.position.setLength(THREE.MathUtils.clamp(newDist, 6, 30));
    }

    document.getElementById('zoomSlider').oninput = (e) => {
        camera.position.setLength(parseFloat(e.target.value));
    };

    document.querySelectorAll('input[type="color"], input[type="range"]').forEach(input => {
        input.oninput = (e) => {
            if(e.target.id === 'driftSpeed') state.drift = parseFloat(e.target.value);
            else state.settings[e.target.id] = e.target.value;
            updateVisuals();
        };
    });

    function hardReset() {
        if(confirm("Confirm Wipe?")) { localStorage.clear(); location.reload(); }
    }

    function saveSession() {
        localStorage.setItem('globe_session_v6', JSON.stringify({
            selected: [...state.selected],
            settings: state.settings,
            rot: [globeGroup.rotation.x, globeGroup.rotation.y]
        }));
    }

    function loadSession() {
        const saved = JSON.parse(localStorage.getItem('globe_session_v6') || '{}');
        if(saved.selected) state.selected = new Set(saved.selected);
        if(saved.settings) state.settings = saved.settings;
        if(saved.rot) { globeGroup.rotation.x = saved.rot[0]; globeGroup.rotation.y = saved.rot[1]; }
        
        Object.keys(state.settings).forEach(k => {
            const el = document.getElementById(k);
            if(el) el.value = state.settings[k];
        });
    }

    function copyMD() {
        const txt = `### Selected\n\n` + [...state.selected].sort().map((n, i) => `${i+1}. ${n}`).join('\n');
        navigator.clipboard.writeText(txt);
        alert("Copied!");
    }

    function importMD() {
        const input = prompt("Paste numbered list:");
        if(input) {
            const matches = input.match(/\d+\.\s(.*)/g);
            if(matches) matches.forEach(m => state.selected.add(m.replace(/^\d+\.\s/, '').trim()));
            updateVisuals();
        }
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        pickingTarget.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
</body>
</html>
