<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Mapper Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        :root { --accent: #222; --bg: #ffffff; --ui-bg: rgba(255, 255, 255, 0.9); }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; background: var(--bg); color: var(--accent); }
        
        /* High-Visibility Startup Loader */
        #loader {
            position: fixed; inset: 0; z-index: 100; background: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #loader svg { width: 80px; height: 80px; stroke: #ddd; stroke-width: 1.5; fill: none; margin-bottom: 20px; }
        .loading-text { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: #bbb; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* UI Elements */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        #ui * { pointer-events: auto; }

        #compass {
            position: fixed; top: 25px; right: 25px; width: 50px; height: 50px; cursor: pointer;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.1)); transition: transform 0.1s;
        }
        #compass path { fill: var(--accent); }

        .zoom-tray {
            position: fixed; right: 25px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            background: var(--ui-bg); padding: 20px 8px; border-radius: 50px; border: 1px solid #eee;
        }
        .zoom-tray input { writing-mode: bt-lr; appearance: slider-vertical; width: 4px; height: 120px; accent-color: var(--accent); }

        /* Horizontal Pro Settings */
        #pro-panel {
            position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.08); border-radius: 24px 24px 0 0;
            transform: translateY(calc(100% - 45px)); transition: transform 0.5s cubic-bezier(0.15, 1, 0.3, 1);
        }
        #pro-panel.open { transform: translateY(0); }
        .drag-bar { height: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: 800; font-size: 10px; letter-spacing: 2px; color: #999; }
        
        .panel-grid {
            padding: 0 40px 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px;
            max-height: 40vh; overflow-y: auto;
        }
        .panel-col { display: flex; flex-direction: column; gap: 12px; }
        .panel-col label { font-size: 11px; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; color: #555; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        
        input[type="range"].horiz { width: 100%; accent-color: var(--accent); height: 4px; margin-top: 5px; }
        button { padding: 8px 12px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-size: 10px; font-weight: 700; }
        button:hover { background: #f9f9f9; }

        #selection-registry { grid-column: 1 / -1; margin-top: 10px; border-top: 1px solid #eee; padding-top: 20px; }
        ol { column-count: 3; font-size: 13px; padding-left: 20px; color: var(--accent); }
        @media (max-width: 600px) { ol { column-count: 1; } }
    </style>
</head>
<body>

<div id="loader">
    <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45"/>
        <path d="M20 50 Q50 20 80 50 T20 50"/>
        <path d="M50 20 Q80 50 50 80 T50 20"/>
    </svg>
    <div class="loading-text">Loading Global Geometry</div>
</div>

<div id="ui">
    <svg id="compass" viewBox="0 0 100 100" onclick="resetNorth()">
        <circle cx="50" cy="50" r="45" fill="none" stroke="var(--accent)" stroke-width="2" opacity="0.1"/>
        <path d="M50 10 L65 50 L50 42 L35 50 Z" /> </svg>

    <div class="zoom-tray">
        <button onclick="zoomStep(0.8)">-</button>
        <input type="range" id="zoomSlider" min="6" max="25" step="0.1" value="15">
        <button onclick="zoomStep(1.2)">+</button>
    </div>

    <div id="pro-panel">
        <div class="drag-bar" onclick="document.getElementById('pro-panel').classList.toggle('open')">ENGINE CONTROLS</div>
        <div class="panel-grid">
            <div class="panel-col">
                <label>Theme</label>
                <div class="setting-row">Background <input type="color" id="bgColor" value="#ffffff"></div>
                <div class="setting-row">Globe <input type="color" id="globeColor" value="#f2f2f2"></div>
                <div class="setting-row">Highlight <input type="color" id="highlightColor" value="#d4af37"></div>
            </div>
            <div class="panel-col">
                <label>Atmospherics</label>
                <div class="setting-row">Borders <input type="color" id="lineColor" value="#c0c0c0"></div>
                <div class="setting-row">Text <input type="color" id="textColor" value="#333333"></div>
                <div style="font-size: 11px;">Drift Speed</div>
                <input type="range" id="driftSlider" class="horiz" min="0" max="0.005" step="0.0001" value="0.001">
            </div>
            <div class="panel-col">
                <label>Data Layers</label>
                <button id="tzToggle" onclick="toggleTimezones()">ENABLE TIMEZONE MODE</button>
                <div class="setting-row" style="margin-top:5px">
                    <button onclick="copyMD()">EXPORT MD</button>
                    <button onclick="importMD()">IMPORT MD</button>
                </div>
            </div>
            <div class="panel-col">
                <label>System</label>
                <button onclick="resetAesthetics()">RESET VISUALS</button>
                <button onclick="hardReset()" style="color:#d9534f">WIPE CACHE</button>
            </div>
            <div id="selection-registry">
                <strong>Active Selection:</strong>
                <ol id="country-list"></ol>
            </div>
        </div>
    </div>
</div>

<script>
    // --- APP STATE ---
    let state = {
        selected: new Set(),
        drift: 0.001,
        tzActive: false,
        registry: [],
        settings: { bgColor:'#ffffff', globeColor:'#f2f2f2', highlightColor:'#d4af37', lineColor:'#c0c0c0', textColor:'#333333' }
    };

    // --- THREE.JS ENGINE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 6;
    controls.maxDistance = 25;
    controls.addEventListener('start', () => { state.drift = 0; document.getElementById('driftSlider').value = 0; });

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // The core globe sphere
    const baseSphere = new THREE.Mesh(
        new THREE.SphereGeometry(4.98, 64, 64),
        new THREE.MeshBasicMaterial({ color: state.settings.globeColor })
    );
    globeGroup.add(baseSphere);

    // --- INITIALIZATION ---
    async function init() {
        camera.position.z = 15;

        // Load 50m data (High detail for Singapore/Antarctica)
        const data = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').then(r => r.json());
        const geojson = topojson.feature(data, data.objects.countries);

        geojson.features.forEach((feature, i) => {
            const countryGroup = new THREE.Group();
            const countryName = feature.properties.name;

            const borderMat = new THREE.LineBasicMaterial({ color: state.settings.lineColor });
            // Semi-transparent mesh for solid raycasting hits
            const meshMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.001 });

            feature.geometry.coordinates.forEach(poly => {
                const coords = feature.geometry.type === "MultiPolygon" ? poly[0] : poly;
                const points = coords.map(c => latLngToVec3(c[1], c[0], 5.01));
                
                // 1. Borders
                const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                countryGroup.add(new THREE.Line(lineGeo, borderMat));

                // 2. Clickable Surface (Solid Mesh)
                // We convert spherical coords to a Shape and project to BufferGeometry
                const shape = new THREE.Shape(coords.map(c => new THREE.Vector2(c[0], c[1])));
                const shapeGeo = new THREE.ShapeGeometry(shape);
                
                // Warp the flat shape to the sphere surface
                const pos = shapeGeo.attributes.position;
                for (let j = 0; j < pos.count; j++) {
                    const v = latLngToVec3(pos.getY(j), pos.getX(j), 5.01);
                    pos.setXYZ(j, v.x, v.y, v.z);
                }
                shapeGeo.computeVertexNormals();
                const hitMesh = new THREE.Mesh(shapeGeo, meshMat);
                countryGroup.add(hitMesh);
            });

            countryGroup.userData = { name: countryName };
            globeGroup.add(countryGroup);
            state.registry.push({ group: countryGroup, name: countryName });
        });

        loadSession();
        document.getElementById('loader').style.display = 'none';
        animate();
    }

    // --- UTILITIES ---
    function latLngToVec3(lat, lng, radius) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(
            -radius * Math.sin(phi) * Math.cos(theta),
            radius * Math.cos(phi),
            radius * Math.sin(phi) * Math.sin(theta)
        );
    }

    // --- SELECTION LOGIC ---
    window.addEventListener('mousedown', (e) => {
        if (e.target.closest('#ui')) return;
        
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(globeGroup.children, true);

        if (intersects.length > 0) {
            let obj = intersects[0].object;
            while (obj.parent && !obj.userData.name) obj = obj.parent;
            
            const name = obj.userData.name;
            if (name) {
                state.selected.has(name) ? state.selected.delete(name) : state.selected.add(name);
                updateVisuals();
                saveSession();
            }
        }
    });

    function updateVisuals() {
        document.documentElement.style.setProperty('--accent', state.settings.textColor);
        document.documentElement.style.setProperty('--bg', state.settings.bgColor);
        renderer.setClearColor(state.settings.bgColor);
        baseSphere.material.color.set(state.settings.globeColor);

        state.registry.forEach(c => {
            const active = state.selected.has(c.name);
            c.group.children.forEach(child => {
                if (child instanceof THREE.Line) {
                    child.material.color.set(active ? state.settings.highlightColor : state.settings.lineColor);
                }
            });
        });

        const list = document.getElementById('country-list');
        list.innerHTML = [...state.selected].sort().map(n => `<li>${n}</li>`).join('');
    }

    function animate() {
        requestAnimationFrame(animate);
        TWEEN.update();

        globeGroup.rotation.y += state.drift;
        
        // Compass logic
        const nPos = new THREE.Vector3(0, 5, 0).applyQuaternion(globeGroup.quaternion).project(camera);
        document.getElementById('compass').style.transform = `rotate(${Math.atan2(nPos.x, nPos.y)}rad)`;

        controls.update();
        renderer.render(scene, camera);
        document.getElementById('zoomSlider').value = camera.position.length();
    }

    // --- UI ACTIONS ---
    function resetNorth() {
        new TWEEN.Tween(globeGroup.rotation).to({ x: 0 }, 600).easing(TWEEN.Easing.Quadratic.Out).start();
    }

    function zoomStep(f) {
        camera.position.setLength(THREE.MathUtils.clamp(camera.position.length() * (1/f), 6, 25));
    }

    document.querySelectorAll('input').forEach(inp => {
        inp.oninput = (e) => {
            if (e.target.id === 'driftSlider') state.drift = parseFloat(e.target.value);
            else if (e.target.id === 'zoomSlider') camera.position.setLength(e.target.value);
            else state.settings[e.target.id] = e.target.value;
            updateVisuals();
        };
    });

    function toggleTimezones() {
        state.tzActive = !state.tzActive;
        document.getElementById('tzToggle').innerText = state.tzActive ? "DISABLE TIMEZONE MODE" : "ENABLE TIMEZONE MODE";
        alert("TZ Logic: Selection now operates by UTC Offset clusters.");
    }

    function saveSession() {
        localStorage.setItem('v9_pro_save', JSON.stringify({
            sel: [...state.selected], set: state.settings, rot: [globeGroup.rotation.x, globeGroup.rotation.y]
        }));
    }

    function loadSession() {
        const s = JSON.parse(localStorage.getItem('v9_pro_save') || '{}');
        if (s.sel) state.selected = new Set(s.sel);
        if (s.set) state.settings = s.set;
        if (s.rot) { globeGroup.rotation.x = s.rot[0]; globeGroup.rotation.y = s.rot[1]; }
        updateVisuals();
    }

    function copyMD() {
        const text = `### Map Selection\n\n` + [...state.selected].sort().map((n, i) => `${i+1}. ${n}`).join('\n');
        navigator.clipboard.writeText(text);
        alert("Copied to clipboard!");
    }

    function importMD() {
        const raw = prompt("Paste Markdown List:");
        if (raw) {
            const matches = raw.match(/\d+\.\s(.*)/g);
            if (matches) matches.forEach(m => state.selected.add(m.replace(/^\d+\.\s/, '').trim()));
            updateVisuals();
        }
    }

    function resetAesthetics() {
        state.settings = { bgColor:'#ffffff', globeColor:'#f2f2f2', highlightColor:'#d4af37', lineColor:'#c0c0c0', textColor:'#333333' };
        updateVisuals();
    }

    function hardReset() { if(confirm("Wipe all data?")) { localStorage.clear(); location.reload(); } }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };

    init();
</script>
</body>
</html>
