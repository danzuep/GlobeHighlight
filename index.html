<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Mapper Pro V16</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        :root { --accent: #222; --bg: #fff; --ui: rgba(255, 255, 255, 0.98); }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; background: #fff; }
        
        #labels { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        .label { position: absolute; font-size: 9px; font-weight: 700; color: #444; pointer-events: none; transform: translate(-50%, -50%); opacity: 0; white-space: nowrap; text-shadow: 0 0 3px #fff; }

        /* Fixed Vertical Zoom - Universal */
        .zoom-tray { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 12px; background: var(--ui); padding: 15px 8px; border-radius: 30px; border: 1px solid #ddd; z-index: 20; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #zoomRange { writing-mode: bt-lr; appearance: slider-vertical; width: 6px; height: 160px; accent-color: var(--accent); cursor: pointer; }

        /* Smart Panel (V11 Layout) */
        #panel { position: fixed; background: var(--ui); box-shadow: 0 0 30px rgba(0,0,0,0.1); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; z-index: 30; }
        
        @media (min-width: 769px) {
            #panel { left: 0; top: 0; width: 320px; height: 100%; transform: translateX(0); }
            #panel.closed { transform: translateX(-275px); }
            .handle { position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 45px; height: 100px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
            .content { padding: 40px 30px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 25px; }
        }

        @media (max-width: 768px) {
            #panel { bottom: 0; left: 0; right: 0; border-radius: 20px 20px 0 0; transform: translateY(0); }
            #panel.closed { transform: translateY(calc(100% - 45px)); }
            .handle { height: 45px; width: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
            .content { padding: 0 20px 30px; max-height: 45vh; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 15px; }
            .section { flex: 1 1 140px; }
        }

        .section { display: flex; flex-direction: column; gap: 8px; }
        .section label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #999; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        input[type="color"] { border: none; width: 22px; height: 22px; cursor: pointer; background: none; }
        ol { font-size: 11px; padding-left: 15px; column-count: 2; }
    </style>
</head>
<body>

<div id="labels"></div>
<div class="zoom-tray">
    <button onclick="zoomStep(1.2)">+</button>
    <input type="range" id="zoomRange" min="6" max="25" step="0.1" value="15">
    <button onclick="zoomStep(0.8)">-</button>
</div>

<div id="panel" class="closed">
    <div class="handle" onclick="document.getElementById('panel').classList.toggle('closed')">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M0 0 L10 0 L5 8 Z" fill="#999"/></svg>
    </div>
    <div class="content">
        <div class="section">
            <label>Theme</label>
            <div class="row">Back <input type="color" id="colorBg" value="#ffffff"></div>
            <div class="row">Globe <input type="color" id="colorGlobe" value="#f2f2f2"></div>
            <div class="row">Highlight <input type="color" id="colorHl" value="#d4af37"></div>
        </div>
        <div class="section">
            <label>Display</label>
            <div class="row">Borders <input type="color" id="colorLine" value="#cccccc"></div>
            <div class="row">Labels <input type="checkbox" id="checkLabels"></div>
            <div class="row">Drift <input type="range" id="driftInp" min="0" max="0.005" step="0.0001" value="0.0005"></div>
        </div>
        <div class="section" style="width:100%">
            <label>Selected</label>
            <ol id="sel-list"></ol>
        </div>
    </div>
</div>

<script>
    const state = { selected: new Set(), showLabels: false, drift: 0.0005, registry: [] };
    let dragStart = { x: 0, y: 0 }, isDragging = false;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const globe = new THREE.Group();
    scene.add(globe);

    // Opaque Base Globe
    const baseSphere = new THREE.Mesh(
        new THREE.SphereGeometry(5, 64, 64),
        new THREE.MeshBasicMaterial({ color: 0xf2f2f2 })
    );
    globe.add(baseSphere);

    async function init() {
        camera.position.z = 15;
        if (window.innerWidth > 768) document.getElementById('panel').classList.remove('closed');

        const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
        const topo = await res.json();
        const geojson = topojson.feature(topo, topo.objects.countries);

        geojson.features.forEach(feat => {
            const countryGroup = new THREE.Group();
            const name = feat.properties.name;
            const centroid = getCentroid(feat.geometry.coordinates);
            const centroidV3 = latLngToVec3(centroid.lat, centroid.lng, 5.01);

            const coords = feat.geometry.type === "MultiPolygon" ? feat.geometry.coordinates : [feat.geometry.coordinates];
            
            coords.forEach(polygon => {
                const ring = polygon[0];
                if (!ring || ring.length < 3) return;

                // 1. MESH FILL (The Fan Strategy)
                const geometry = new THREE.BufferGeometry();
                const vertices = [];
                const center = centroidV3;

                for (let i = 0; i < ring.length; i++) {
                    const p1 = latLngToVec3(ring[i][1], ring[i][0], 5.01);
                    const p2 = latLngToVec3(ring[(i + 1) % ring.length][1], ring[(i + 1) % ring.length][0], 5.01);
                    
                    vertices.push(center.x, center.y, center.z);
                    vertices.push(p1.x, p1.y, p1.z);
                    vertices.push(p2.x, p2.y, p2.z);
                }

                geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                geometry.computeVertexNormals();

                const mesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ 
                    color: 0xf2f2f2, 
                    side: THREE.DoubleSide,
                    polygonOffset: true,
                    polygonOffsetFactor: -1
                }));
                countryGroup.add(mesh);

                // 2. BORDERS (The Line Strategy)
                const linePts = ring.map(pt => latLngToVec3(pt[1], pt[0], 5.02));
                const lineGeo = new THREE.BufferGeometry().setFromPoints(linePts);
                countryGroup.add(new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0xcccccc })));
            });

            countryGroup.userData = { name, centroid };
            globe.add(countryGroup);
            
            // Label UI
            const lbl = document.createElement('div');
            lbl.className = 'label';
            lbl.innerText = name;
            document.getElementById('labels').appendChild(lbl);
            
            state.registry.push({ group: countryGroup, name, label: lbl, centroid });
        });

        animate();
    }

    function latLngToVec3(lat, lng, r) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(-r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
    }

    function getCentroid(coords) {
        let lat = 0, lng = 0, count = 0;
        const process = (c) => { lat += c[1]; lng += c[0]; count++; };
        coords.forEach(p => Array.isArray(p[0]) ? p[0].forEach(process) : process(p));
        return { lat: lat / count, lng: lng / count };
    }

    // --- Interaction ---
    window.addEventListener('pointerdown', (e) => { dragStart = { x: e.clientX, y: e.clientY }; isDragging = false; });
    window.addEventListener('pointermove', (e) => { if (Math.hypot(e.clientX - dragStart.x, e.clientY - dragStart.y) > 8) isDragging = true; });
    window.addEventListener('pointerup', (e) => {
        if (isDragging || e.target.closest('#panel') || e.target.closest('.zoom-tray')) return;

        const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);

        const hits = raycaster.intersectObjects(globe.children, true);
        if (hits.length > 0) {
            let o = hits[0].object;
            while(o.parent && !o.userData.name) o = o.parent;
            if (o.userData.name) {
                const n = o.userData.name;
                state.selected.has(n) ? state.selected.delete(n) : state.selected.add(n);
                updateVisuals();
            }
        }
    });

    function updateVisuals() {
        const hl = document.getElementById('colorHl').value;
        const gl = document.getElementById('colorGlobe').value;
        const bc = document.getElementById('colorLine').value;
        
        renderer.setClearColor(document.getElementById('colorBg').value);
        baseSphere.material.color.set(gl);

        state.registry.forEach(c => {
            const isSel = state.selected.has(c.name);
            c.group.children.forEach(child => {
                if (child instanceof THREE.Mesh) child.material.color.set(isSel ? hl : gl);
                if (child instanceof THREE.Line) child.material.color.set(bc);
            });
        });
        document.getElementById('sel-list').innerHTML = [...state.selected].sort().map(n => `<li>${n}</li>`).join('');
    }

    function animate() {
        requestAnimationFrame(animate);
        globe.rotation.y += state.drift;
        controls.update();

        state.registry.forEach(c => {
            if (!state.showLabels) { c.label.style.opacity = 0; return; }
            const v = latLngToVec3(c.centroid.lat, c.centroid.lng, 5.05).applyMatrix4(globe.matrixWorld);
            const dot = v.clone().normalize().dot(camera.position.clone().normalize());
            
            if (dot > 0.4) { // Only front-facing labels
                v.project(camera);
                c.label.style.opacity = 1;
                c.label.style.left = `${(v.x * 0.5 + 0.5) * window.innerWidth}px`;
                c.label.style.top = `${(-v.y * 0.5 + 0.5) * window.innerHeight}px`;
            } else {
                c.label.style.opacity = 0;
            }
        });

        renderer.render(scene, camera);
        document.getElementById('zoomRange').value = camera.position.length();
    }

    function zoomStep(f) { camera.position.setLength(THREE.MathUtils.clamp(camera.position.length() * (1/f), 6, 25)); }
    document.getElementById('zoomRange').oninput = (e) => camera.position.setLength(e.target.value);
    document.getElementById('driftInp').oninput = (e) => state.drift = parseFloat(e.target.value);
    document.getElementById('checkLabels').onchange = (e) => state.showLabels = e.target.checked;
    document.querySelectorAll('input[type="color"]').forEach(i => i.oninput = updateVisuals);
    window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };

    init();
</script>
</body>
</html>
