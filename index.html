<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Mapper Pro</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --accent: #d4af37; --bg: #ffffff; --panel: #f9f9f9; }
        body { margin: 0; font-family: -apple-system, sans-serif; overflow: hidden; background: var(--bg); touch-action: none; }
        
        #loader {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            background: white; z-index: 100; transition: opacity 0.5s;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #eee; border-top-color: var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #container { width: 100vw; height: 100vh; cursor: grab; background: transparent; }
        
        /* Compass */
        #compass {
            position: fixed; top: 20px; right: 20px; width: 50px; height: 50px;
            cursor: pointer; z-index: 60; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
            transition: transform 0.2s;
        }
        #compass:active { transform: scale(0.9); }

        /* Zoom Slider */
        .zoom-controls {
            position: fixed; right: 25px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.8); padding: 15px 5px; border-radius: 30px; z-index: 40;
        }
        .zoom-controls input { writing-mode: bt-lr; appearance: slider-vertical; width: 8px; height: 120px; }

        /* Bottom Panel */
        #config-panel {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel);
            box-shadow: 0 -5px 25px rgba(0,0,0,0.15); border-radius: 20px 20px 0 0;
            transform: translateY(calc(100% - 45px)); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); z-index: 50;
        }
        #config-panel.open { transform: translateY(0); }
        #config-panel.open .triangle { transform: rotate(180deg); }

        .drag-handle { 
            height: 45px; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; font-weight: bold; color: #444; gap: 10px;
        }
        .triangle { transition: transform 0.3s; font-size: 12px; }

        .panel-content {
            padding: 0 20px 30px 20px; max-height: 70vh; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; font-size: 13px; }
        .control-group label { font-weight: 600; color: #666; }
        
        button { 
            padding: 10px; border: 1px solid #ddd; background: white; border-radius: 8px; 
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #f0f0f0; }
        
        #country-list-container { 
            grid-column: 1 / -1; border-top: 1px solid #ddd; padding-top: 15px; 
        }
        ol { column-count: 2; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<svg id="compass" viewBox="0 0 100 100" onclick="resetToNorth()">
    <circle cx="50" cy="50" r="45" fill="white" />
    <path d="M50 10 L60 50 L50 90 L40 50 Z" fill="#d9534f" /> <path d="M50 90 L60 50 L40 50 Z" fill="#5bc0de" /> <circle cx="50" cy="50" r="3" fill="#333" />
</svg>

<div class="zoom-controls">
    <button onclick="adjustZoom(1.2)">+</button>
    <input type="range" id="zoomSlider" min="150" max="2000" value="250">
    <button onclick="adjustZoom(0.8)">-</button>
</div>

<div id="container">
    <svg id="globe"></svg>
</div>

<div id="config-panel">
    <div class="drag-handle" onclick="document.getElementById('config-panel').classList.toggle('open')">
        <span class="triangle">▲</span> SETTINGS & COUNTRIES
    </div>
    <div class="panel-content">
        <div class="control-group">
            <label>Colors</label>
            <span>BG: <input type="color" id="bgColor" value="#ffffff"></span>
            <span>Globe: <input type="color" id="globeColor" value="#f7f7f7"></span>
            <span>Highlight: <input type="color" id="highlightColor" value="#d4af37"></span>
        </div>
        <div class="control-group">
            <label>Lines & Drift</label>
            <span>Borders: <input type="color" id="lineColor" value="#c0c0c0"></span>
            <span>Thickness: <input type="range" id="lineWidth" min="0.1" max="2" step="0.1" value="0.5"></span>
            <span>Drift Speed: <input type="range" id="driftSpeed" min="0" max="1" step="0.05" value="0.1"></span>
        </div>
        <div class="control-group">
            <label>Labels</label>
            <span><input type="checkbox" id="showLabels"> Local Language</span>
            <span>Size: <input type="range" id="fontSize" min="6" max="20" value="10"></span>
            <span>Color: <input type="color" id="textColor" value="#333333"></span>
        </div>
        <div class="control-group">
            <label>Actions</label>
            <button onclick="importMarkdown()">Import MD</button>
            <button onclick="copyMarkdown()">Export MD</button>
            <button onclick="resetAll()" style="color: #d9534f;">Hard Reset</button>
        </div>

        <div id="country-list-container">
            <strong>Selected Countries:</strong>
            <ol id="country-list"></ol>
        </div>
    </div>
</div>

<script>
    let width = window.innerWidth, height = window.innerHeight;
    let selectedCountries = new Set();
    let worldData, rotationTimer;
    let velocity = [0.1, 0]; 
    let isUserDragging = false;

    const projection = d3.geoOrthographic()
        .scale(250)
        .translate([width / 2, height / 2])
        .rotate([0, -10]);

    const path = d3.geoPath().projection(projection);
    const svg = d3.select("#globe").attr("width", width).attr("height", height);
    
    // Layers
    const gGlobe = svg.append("g");
    const ocean = gGlobe.append("path").datum({type: "Sphere"}).attr("class", "ocean");
    const gLandmass = svg.append("g");
    const gCountries = svg.append("g");
    const gLabels = svg.append("g");

    let settings = {
        bgColor: "#ffffff",
        globeColor: "#f7f7f7",
        highlightColor: "#d4af37",
        lineColor: "#c0c0c0",
        lineWidth: 0.5,
        textColor: "#333333",
        showLabels: false,
        fontSize: 10,
        driftSpeed: 0.1
    };

    async function init() {
        try {
            const res = await fetch("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson");
            worldData = await res.json();
            loadState();
            setupInteractions();
            startInertia();
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 500);
            render();
        } catch (e) { console.error(e); }
    }

    function render() {
        d3.select("body").style("background-color", settings.bgColor);
        ocean.attr("d", path).attr("fill", settings.globeColor);

        // Landmass Outline (Thicker)
        const land = gLandmass.selectAll(".land-outline").data([worldData]);
        land.join("path")
            .attr("class", "land-outline")
            .attr("d", path)
            .attr("fill", "none")
            .attr("stroke", settings.lineColor)
            .attr("stroke-width", settings.lineWidth * 2.5) // Thicker halo
            .attr("pointer-events", "none");

        // Countries
        gCountries.selectAll(".country")
            .data(worldData.features)
            .join("path")
            .attr("class", "country")
            .attr("d", path)
            .attr("fill", d => selectedCountries.has(d.properties.name) ? settings.highlightColor : "transparent")
            .attr("stroke", settings.lineColor)
            .attr("stroke-width", settings.lineWidth)
            .on("click", (e, d) => {
                const name = d.properties.name;
                selectedCountries.has(name) ? selectedCountries.delete(name) : selectedCountries.add(name);
                saveState();
                render();
            });

        // Labels
        gLabels.selectAll(".label").remove();
        if (settings.showLabels) {
            gLabels.selectAll(".label")
                .data(worldData.features)
                .join("text")
                .attr("class", "label")
                .attr("transform", d => `translate(${path.centroid(d)})`)
                .text(d => d.properties.name)
                .attr("font-size", `${settings.fontSize}px`)
                .attr("fill", settings.textColor)
                .attr("text-anchor", "middle")
                .style("display", d => {
                    const center = projection.invert([width/2, height/2]);
                    const visible = d3.geoDistance(d3.geoCentroid(d), center) < Math.PI / 2;
                    return visible && path.centroid(d)[0] ? "block" : "none";
                });
        }
        updateList();
    }

    function setupInteractions() {
        const drag = d3.drag()
            .on("start", () => { isUserDragging = true; velocity = [0,0]; })
            .on("drag", (event) => {
                const rotate = projection.rotate();
                const k = 75 / projection.scale();
                velocity = [event.dx * k, -event.dy * k];
                projection.rotate([rotate[0] + velocity[0], rotate[1] + velocity[1]]);
                render();
            })
            .on("end", () => { isUserDragging = false; startInertia(); });

        const zoom = d3.zoom()
            .scaleExtent([150, 2000])
            .on("zoom", (event) => {
                projection.scale(event.transform.k);
                document.getElementById("zoomSlider").value = event.transform.k;
                render();
            });

        // Apply zoom and drag to the container
        d3.select("#container").call(drag).call(zoom);

        // Slider Zoom
        document.getElementById("zoomSlider").oninput = function() {
            const val = +this.value;
            projection.scale(val);
            d3.select("#container").call(zoom.transform, d3.zoomIdentity.scale(val));
            render();
        };

        // UI Binding
        const inputs = ["bgColor", "globeColor", "highlightColor", "lineColor", "lineWidth", "textColor", "fontSize", "driftSpeed"];
        inputs.forEach(id => {
            document.getElementById(id).oninput = (e) => {
                settings[id] = (id === "lineWidth" || id === "fontSize" || id === "driftSpeed") ? +e.target.value : e.target.value;
                saveState();
                render();
            };
        });
        document.getElementById("showLabels").onchange = (e) => {
            settings.showLabels = e.target.checked;
            saveState();
            render();
        };
    }

    function startInertia() {
        if (rotationTimer) rotationTimer.stop();
        rotationTimer = d3.timer(() => {
            if (isUserDragging) return;
            const rotate = projection.rotate();
            
            // Apply current velocity
            projection.rotate([rotate[0] + velocity[0], rotate[1] + velocity[1]]);
            
            // Friction logic
            velocity[0] *= 0.95;
            velocity[1] *= 0.95;

            // Maintain minimum drift based on slider
            if (Math.abs(velocity[0]) < settings.driftSpeed) velocity[0] = settings.driftSpeed;
            
            render();
        });
    }

    function resetToNorth() {
        d3.transition().duration(750).tween("rotate", () => {
            const r = d3.interpolate(projection.rotate(), [0, -10]);
            return t => {
                projection.rotate(r(t));
                render();
            };
        });
    }

    function adjustZoom(factor) {
        const newScale = Math.min(2000, Math.max(150, projection.scale() * factor));
        d3.select("#container").transition().duration(300).call(
            d3.zoom().on("zoom", (event) => {
                projection.scale(event.transform.k);
                render();
            }).transform, d3.zoomIdentity.scale(newScale)
        );
    }

    function saveState() {
        localStorage.setItem("globe_state_v3", JSON.stringify({
            selected: Array.from(selectedCountries),
            settings,
            rot: projection.rotate(),
            scale: projection.scale()
        }));
    }

    function loadState() {
        const saved = localStorage.getItem("globe_state_v3");
        if (!saved) return;
        const data = JSON.parse(saved);
        selectedCountries = new Set(data.selected);
        settings = data.settings;
        projection.rotate(data.rot).scale(data.scale);
        Object.keys(settings).forEach(k => {
            const el = document.getElementById(k);
            if(el) el.type === "checkbox" ? el.checked = settings[k] : el.value = settings[k];
        });
        document.getElementById("zoomSlider").value = data.scale;
    }

    function resetAll() {
        localStorage.clear();
        document.cookie.split(";").forEach(c => {
            document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
        });
        location.reload();
    }

    function updateList() {
        const list = document.getElementById("country-list");
        list.innerHTML = "";
        Array.from(selectedCountries).sort().forEach(n => {
            const li = document.createElement("li");
            li.textContent = n;
            list.appendChild(li);
        });
    }

    function copyMarkdown() {
        const text = "### Selected Countries\n\n" + 
            Array.from(selectedCountries).sort().map((c, i) => `${i+1}. ${c}`).join("\n");
        navigator.clipboard.writeText(text);
        alert("Numbered list copied!");
    }

    function importMarkdown() {
        const input = prompt("Paste Markdown list here:");
        if (!input) return;
        const lines = input.match(/\d+\.\s(.*)/g);
        if (lines) {
            lines.forEach(l => selectedCountries.add(l.replace(/^\d+\.\s/, "").trim()));
            saveState();
            render();
        }
    }

    window.onresize = () => {
        width = window.innerWidth; height = window.innerHeight;
        svg.attr("width", width).attr("height", height);
        projection.translate([width/2, height/2]);
        render();
    };

    init();
</script>
</body>
</html>
