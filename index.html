<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Mapper Pro V12</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        :root { --accent: #222; --bg: #fff; --ui-panel: rgba(255, 255, 255, 0.98); }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; background: var(--bg); color: var(--accent); }
        
        #labels { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        .label { position: absolute; font-size: 8px; font-weight: 700; color: #555; pointer-events: none; text-shadow: 0 0 2px #fff; transform: translate(-50%, -50%); opacity: 0; transition: opacity 0.3s; }

        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        #ui * { pointer-events: auto; }

        /* Unified Vertical Zoom Bar */
        .zoom-container { 
            position: fixed; right: 25px; top: 50%; transform: translateY(-50%); 
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            background: var(--ui-panel); padding: 20px 10px; border-radius: 40px; border: 1px solid #eee;
        }
        #zoomRange { writing-mode: bt-lr; appearance: slider-vertical; width: 6px; height: 180px; accent-color: var(--accent); cursor: pointer; }

        #panel { position: fixed; background: var(--ui-panel); box-shadow: 0 0 40px rgba(0,0,0,0.1); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }
        
        /* Desktop */
        @media (min-width: 769px) {
            #panel { left: 0; top: 0; width: 340px; height: 100%; transform: translateX(0); }
            #panel.closed { transform: translateX(-295px); }
            .handle { position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 45px; height: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
            .content { padding: 50px 35px; flex-grow: 1; display: flex; flex-direction: column; gap: 30px; overflow-y: auto; }
        }

        /* Mobile */
        @media (max-width: 768px) {
            #panel { bottom: 0; left: 0; right: 0; border-radius: 24px 24px 0 0; transform: translateY(0); }
            #panel.closed { transform: translateY(calc(100% - 45px)); }
            .handle { height: 45px; width: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
            .content { padding: 0 25px 30px; max-height: 45vh; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 20px; }
            .section { flex: 1 1 140px; }
        }

        .section { display: flex; flex-direction: column; gap: 12px; }
        .section label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; color: #aaa; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        button { padding: 10px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-size: 10px; font-weight: 700; }
        ol { font-size: 12px; padding-left: 18px; column-count: 2; margin: 0; }
    </style>
</head>
<body>

<div id="labels"></div>

<div id="ui">
    <div class="zoom-container">
        <button onclick="zoomBtn(1.2)">+</button>
        <input type="range" id="zoomRange" min="6" max="25" step="0.1" value="15">
        <button onclick="zoomBtn(0.8)">-</button>
    </div>

    <div id="panel">
        <div class="handle" onclick="togglePanel()">
            <svg width="12" height="12" viewBox="0 0 10 10"><path d="M0 2 L10 2 L5 9 Z" fill="#999"/></svg>
        </div>
        <div class="content">
            <div class="section">
                <label>Appearance</label>
                <div class="row">Back <input type="color" id="bgColor" value="#ffffff"></div>
                <div class="row">Globe <input type="color" id="globeColor" value="#f2f2f2"></div>
                <div class="row">Highlight <input type="color" id="highlightColor" value="#d4af37"></div>
                <div class="row">Labels <input type="checkbox" id="showLabels"> Show Names</div>
            </div>
            <div class="section">
                <label>Dynamics</label>
                <div class="row">Borders <input type="color" id="lineColor" value="#c0c0c0"></div>
                <span style="font-size:11px">Auto Drift</span>
                <input type="range" id="driftInp" min="0" max="0.005" step="0.0001" style="width:100%; accent-color:#222">
            </div>
            <div class="section" style="width:100%">
                <label>Selection</label>
                <ol id="country-list"></ol>
            </div>
        </div>
    </div>
</div>

<script>
    let state = {
        selected: new Set(),
        drift: 0.001,
        registry: [],
        showLabels: false,
        settings: { bgColor:'#ffffff', globeColor:'#f2f2f2', highlightColor:'#d4af37', lineColor:'#c0c0c0' }
    };

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    const globe = new THREE.Group();
    scene.add(globe);

    // Labels Container
    const labelContainer = document.getElementById('labels');

    async function init() {
        camera.position.z = 15;
        const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');
        const data = await res.json();
        const features = topojson.feature(data, data.objects.countries).features;

        features.forEach(feat => {
            const countryGroup = new THREE.Group();
            // Offset 5.01 to fix Z-fighting
            const meshMat = new THREE.MeshBasicMaterial({ color: state.settings.globeColor });
            const borderMat = new THREE.LineBasicMaterial({ color: state.settings.lineColor });

            feat.geometry.coordinates.forEach(poly => {
                const coords = feat.geometry.type === "MultiPolygon" ? poly[0] : poly;
                const shape = new THREE.Shape(coords.map(c => new THREE.Vector2(c[0], c[1])));
                const geo = new THREE.ShapeGeometry(shape);
                const pos = geo.attributes.position;
                for(let i=0; i<pos.count; i++) {
                    const v = latLngToVec3(pos.getY(i), pos.getX(i), 5.01);
                    pos.setXYZ(i, v.x, v.y, v.z);
                }
                countryGroup.add(new THREE.Mesh(geo, meshMat.clone()));
                countryGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(coords.map(c => latLngToVec3(c[1], c[0], 5.01))), borderMat));
            });

            countryGroup.userData = { 
                name: feat.properties.name,
                centroid: getCentroid(feat.geometry.coordinates)
            };
            globe.add(countryGroup);
            state.registry.push({ group: countryGroup, name: feat.properties.name, centroid: countryGroup.userData.centroid });
            
            // Create Label Element
            const div = document.createElement('div');
            div.className = 'label';
            div.innerText = feat.properties.name;
            labelContainer.appendChild(div);
            countryGroup.userData.label = div;
        });
        
        animate();
    }

    function getCentroid(coords) {
        // Crude centroid calculation for label placement
        let lat = 0, lng = 0, count = 0;
        const process = (c) => { lat += c[1]; lng += c[0]; count++; };
        coords.forEach(p => Array.isArray(p[0]) ? p[0].forEach(process) : process(p));
        return { lat: lat/count, lng: lng/count };
    }

    function latLngToVec3(lat, lng, r) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(-r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
    }

    function animate() {
        requestAnimationFrame(animate);
        globe.rotation.y += state.drift;

        // Label update
        if(state.showLabels) {
            state.registry.forEach(c => {
                const vec = latLngToVec3(c.centroid.lat, c.centroid.lng, 5.2);
                vec.project(camera);
                const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-vec.y * 0.5 + 0.5) * window.innerHeight;
                
                // Only show if facing camera
                const dist = new THREE.Vector3().setFromSphericalCoords(5.1, (90-c.centroid.lat)*Math.PI/180, (c.centroid.lng+180)*Math.PI/180).applyQuaternion(globe.quaternion).dot(camera.getWorldDirection(new THREE.Vector3()));
                c.group.userData.label.style.opacity = dist > 0 ? 1 : 0;
                c.group.userData.label.style.left = `${x}px`;
                c.group.userData.label.style.top = `${y}px`;
            });
        } else {
            document.querySelectorAll('.label').forEach(l => l.style.opacity = 0);
        }

        controls.update();
        renderer.render(scene, camera);
    }

    // Interaction & Logic
    window.addEventListener('pointerdown', (e) => {
        if (e.target.closest('#ui')) return;
        const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(globe.children, true);
        if(hits.length > 0) {
            let p = hits[0].object;
            while(p && !p.userData.name) p = p.parent;
            if(p) {
                state.selected.has(p.userData.name) ? state.selected.delete(p.userData.name) : state.selected.add(p.userData.name);
                updateVisuals();
            }
        }
    });

    function updateVisuals() {
        state.registry.forEach(c => {
            const isSel = state.selected.has(c.name);
            c.group.children.forEach(ch => {
                if(ch instanceof THREE.Mesh) ch.material.color.set(isSel ? state.settings.highlightColor : state.settings.globeColor);
            });
        });
        document.getElementById('country-list').innerHTML = [...state.selected].sort().map(n => `<li>${n}</li>`).join('');
    }

    function togglePanel() { document.getElementById('panel').classList.toggle('closed'); }
    function zoomBtn(f) { camera.position.setLength(THREE.MathUtils.clamp(camera.position.length() * (1/f), 6, 25)); }
    document.getElementById('showLabels').onchange = (e) => state.showLabels = e.target.checked;
    document.getElementById('driftInp').oninput = (e) => state.drift = parseFloat(e.target.value);
    window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };

    init();
</script>
</body>
</html>
