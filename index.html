<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Mapper Pro V21</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        :root { --accent: #111; --bg: #ffffff; --ui: rgba(255, 255, 255, 0.98); }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; background: #fff; color: var(--accent); }
        
        #labels { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        .label { position: absolute; font-size: 10px; font-weight: 800; color: #222; pointer-events: none; transform: translate(-50%, -50%); opacity: 0; text-shadow: 0 0 4px #fff; transition: opacity 0.2s; }

        .zoom-tray { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 12px; background: var(--ui); padding: 15px 10px; border-radius: 40px; border: 1px solid #ddd; z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        #zoomRange { writing-mode: bt-lr; appearance: slider-vertical; width: 6px; height: 180px; accent-color: var(--accent); cursor: pointer; }

        #panel { position: fixed; background: var(--ui); box-shadow: 0 0 40px rgba(0,0,0,0.12); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; z-index: 200; border: 1px solid #eee; }
        
        @media (min-width: 769px) {
            #panel { left: 0; top: 0; width: 340px; height: 100%; transform: translateX(0); }
            #panel.closed { transform: translateX(-340px); }
            .handle { position: absolute; left: 100%; top: 50%; transform: translateY(-50%); width: 42px; height: 80px; background: var(--ui); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #eee; border-left: none; border-radius: 0 12px 12px 0; }
            .handle svg { transition: transform 0.3s; transform: rotate(90deg); }
            #panel.closed .handle svg { transform: rotate(-90deg); }
            .content { padding: 40px 30px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 25px; }
        }

        @media (max-width: 768px) {
            #panel { bottom: 0; left: 0; right: 0; border-radius: 24px 24px 0 0; transform: translateY(0); }
            #panel.closed { transform: translateY(calc(100% - 50px)); }
            .handle { height: 50px; width: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
            .handle svg { transition: transform 0.3s; transform: rotate(0deg); }
            #panel.closed .handle svg { transform: rotate(180deg); }
            .content { padding: 0 24px 30px; max-height: 50vh; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 18px; }
            .section { flex: 1 1 140px; }
        }

        .section { display: flex; flex-direction: column; gap: 10px; }
        .section label { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #bbb; letter-spacing: 1.5px; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
        .row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 600; }
        
        .export-box { display: flex; gap: 5px; }
        select { flex-grow: 1; padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-size: 11px; background: #fff; }
        button { padding: 10px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 700; transition: 0.2s; }
        button.primary { background: var(--accent); color: #fff; border: none; }

        ol { font-size: 11px; padding-left: 18px; column-count: 2; margin: 0; line-height: 1.6; color: #444; }
        input[type="color"] { border: none; width: 22px; height: 22px; cursor: pointer; background: none; }
    </style>
</head>
<body>

<div id="labels"></div>
<div class="zoom-tray">
    <button onclick="zoomStep(1.2)">+</button>
    <input type="range" id="zoomRange" min="6" max="25" step="0.1" value="15">
    <button onclick="zoomStep(0.8)">-</button>
</div>

<div id="panel">
    <div class="handle" onclick="document.getElementById('panel').classList.toggle('closed')">
        <svg width="12" height="12" viewBox="0 0 10 10"><path d="M0 2 L10 2 L5 9 Z" fill="#999"/></svg>
    </div>
    <div class="content">
        <div class="section">
            <label>Interface</label>
            <div class="row">Back <input type="color" id="cfgBg" value="#ffffff"></div>
            <div class="row">Ocean <input type="color" id="cfgOcean" value="#f2f2f2"></div>
            <div class="row">Select <input type="color" id="cfgHl" value="#d4af37"></div>
            <div class="row">Labels <input type="checkbox" id="cfgLabels"></div>
        </div>
        
        <div class="section">
            <label>Export Selection</label>
            <div class="export-box">
                <select id="exportFormat">
                    <option value="md">Markdown (.md)</option>
                    <option value="json">JSON (.json)</option>
                    <option value="csv">CSV (.csv)</option>
                </select>
                <button onclick="handleExport()">Get File</button>
            </div>
            <button class="primary" onclick="state.selected.clear(); updateVisuals();">Reset All</button>
        </div>

        <div class="section" style="width:100%">
            <label>Selected (<span id="sel-count">0</span>)</label>
            <ol id="sel-list"></ol>
        </div>
    </div>
</div>

<script>
    const state = { 
        selected: new Set(), 
        labels: false, 
        drift: 0.0006, 
        registry: [], 
        features: [] 
    };
    let dragStart = { x: 0, y: 0 }, isDragging = false;

    // --- THREE.JS SCENE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setClearColor(0xffffff, 1);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.addEventListener('start', () => state.drift = 0);

    const globe = new THREE.Group();
    scene.add(globe);

    // Ocean Base (The Hit-Target)
    const ocean = new THREE.Mesh(
        new THREE.SphereGeometry(5, 64, 64),
        new THREE.MeshBasicMaterial({ color: 0xf2f2f2 })
    );
    globe.add(ocean);

    // --- DATA HANDLING ---
    async function init() {
        camera.position.z = 15;
        if (window.innerWidth <= 768) document.getElementById('panel').classList.add('closed');

        const data = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').then(r=>r.json());
        state.features = topojson.feature(data, data.objects.countries).features;

        state.features.forEach((feat, idx) => {
            const countryGroup = new THREE.Group();
            const coords = feat.geometry.type === "MultiPolygon" ? feat.geometry.coordinates : [feat.geometry.coordinates];
            
            coords.forEach(poly => {
                const ring = poly[0];
                if (!ring || ring.length < 3) return;

                const geometry = new THREE.BufferGeometry();
                const vertices = [];
                const centroidArr = getCentroid(ring);
                const cV3 = latLngToVec3(centroidArr[1], centroidArr[0], 5.01);

                for (let i = 0; i < ring.length; i++) {
                    const p1 = latLngToVec3(ring[i][1], ring[i][0], 5.01);
                    const p2 = latLngToVec3(ring[(i + 1) % ring.length][1], ring[(i + 1) % ring.length][0], 5.01);
                    const mid = new THREE.Vector3().addVectors(p1, p2).divideScalar(2).setLength(5.01);
                    
                    vertices.push(cV3.x, cV3.y, cV3.z, p1.x, p1.y, p1.z, mid.x, mid.y, mid.z);
                    vertices.push(cV3.x, cV3.y, cV3.z, mid.x, mid.y, mid.z, p2.x, p2.y, p2.z);
                }

                geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                const mesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ color: 0xf2f2f2, side: THREE.DoubleSide }));
                countryGroup.add(mesh);

                const linePts = ring.map(pt => latLngToVec3(pt[1], pt[0], 5.012));
                countryGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(linePts), new THREE.LineBasicMaterial({ color: 0xcccccc })));
            });

            countryGroup.userData = { name: feat.properties.name };
            globe.add(countryGroup);

            const lbl = document.createElement('div');
            lbl.className = 'label';
            lbl.innerText = feat.properties.name;
            document.getElementById('labels').appendChild(lbl);

            const c = getCentroid(coords[0][0]);
            state.registry.push({ group: countryGroup, name: feat.properties.name, label: lbl, centroid: {lat: c[1], lng: c[0]} });
        });
        
        updateVisuals();
        animate();
    }

    function latLngToVec3(lat, lng, r) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(-r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
    }

    function getCentroid(pts) {
        let x = 0, y = 0;
        pts.forEach(p => { x += p[0]; y += p[1]; });
        return [x/pts.length, y/pts.length];
    }

    // --- RENDERING LOOP ---
    function animate() {
        requestAnimationFrame(animate);
        const zoomScale = THREE.MathUtils.clamp(camera.position.length() / 15, 0.1, 1.5);
        globe.rotation.y += state.drift * zoomScale;
        controls.update();

        state.registry.forEach(c => {
            if(!state.labels) { c.label.style.opacity = 0; return; }
            const v = latLngToVec3(c.centroid.lat, c.centroid.lng, 5.05).applyMatrix4(globe.matrixWorld);
            const camDist = v.distanceTo(camera.position);
            const globeDist = ocean.position.applyMatrix4(globe.matrixWorld).distanceTo(camera.position);
            
            // Labels only show if they are on the front side
            if (camDist < globeDist) {
                v.project(camera);
                c.label.style.opacity = 1;
                c.label.style.left = `${(v.x * 0.5 + 0.5) * window.innerWidth}px`;
                c.label.style.top = `${(-v.y * 0.5 + 0.5) * window.innerHeight}px`;
            } else {
                c.label.style.opacity = 0;
            }
        });

        renderer.render(scene, camera);
        document.getElementById('zoomRange').value = camera.position.length();
    }

    // --- SELECTION ENGINE ---
    window.addEventListener('pointerdown', e => { dragStart = {x:e.clientX, y:e.clientY}; isDragging = false; });
    window.addEventListener('pointermove', e => { if(Math.hypot(e.clientX-dragStart.x, e.clientY-dragStart.y) > 8) isDragging = true; });
    window.addEventListener('pointerup', e => {
        if (isDragging || e.target.closest('#panel') || e.target.closest('.zoom-tray')) return;

        const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
        const ray = new THREE.Raycaster();
        ray.setFromCamera(mouse, camera);
        
        // INTERSECT CHECK: Front-side only
        const hits = ray.intersectObject(ocean);
        if (hits.length > 0) {
            const hit = hits[0];
            // Ensure the hit point is actually facing the camera (Hemisphere Check)
            const worldPoint = hit.point.clone();
            const cameraDir = new THREE.Vector3().subVectors(camera.position, worldPoint).normalize();
            const surfaceNormal = worldPoint.clone().normalize();
            
            if (surfaceNormal.dot(cameraDir) > 0) {
                const pt = worldPoint.applyMatrix4(globe.matrixWorld.invert());
                const lat = 90 - (Math.acos(pt.y / 5) * 180 / Math.PI);
                const lng = ((Math.atan2(pt.z, -pt.x) * 180 / Math.PI) + 180) % 360 - 180;

                const found = state.features.find(f => isPointInCountry([lng, lat], f));
                if (found) {
                    const name = found.properties.name;
                    state.selected.has(name) ? state.selected.delete(name) : state.selected.add(name);
                    updateVisuals();
                }
            }
        }
    });

    function isPointInCountry(pt, feat) {
        const coords = feat.geometry.type === "MultiPolygon" ? feat.geometry.coordinates : [feat.geometry.coordinates];
        return coords.some(poly => {
            const ring = poly[0];
            let inside = false;
            for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                if (((ring[i][1] > pt[1]) !== (ring[j][1] > pt[1])) && (pt[0] < (ring[j][0] - ring[i][0]) * (pt[1] - ring[i][1]) / (ring[j][1] - ring[i][1]) + ring[i][0])) inside = !inside;
            }
            return inside;
        });
    }

    function updateVisuals() {
        const hlc = document.getElementById('cfgHl').value;
        const ocn = document.getElementById('cfgOcean').value;
        renderer.setClearColor(document.getElementById('cfgBg').value);
        ocean.material.color.set(ocn);

        state.registry.forEach(c => {
            const isSel = state.selected.has(c.name);
            c.group.children.forEach(m => { 
                if(m instanceof THREE.Mesh) m.material.color.set(isSel ? hlc : ocn); 
            });
            // PHYSICAL OFFSET: Move selected countries 0.02 units further out to kill Z-Fighting
            c.group.scale.setScalar(isSel ? 1.004 : 1.0);
        });

        document.getElementById('sel-list').innerHTML = [...state.selected].sort().map(n => `<li>${n}</li>`).join('');
        document.getElementById('sel-count').innerText = state.selected.size;
    }

    function handleExport() {
        const type = document.getElementById('exportFormat').value;
        const list = [...state.selected].sort();
        let content = type === 'md' ? "## Selection\n" + list.map(n => `- [x] ${n}`).join("\n") : 
                      type === 'json' ? JSON.stringify(list, null, 2) : "Country\n" + list.join("\n");
        const blob = new Blob([content], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = `map-selection.${type}`; a.click();
    }

    function zoomStep(f) { camera.position.setLength(THREE.MathUtils.clamp(camera.position.length() * (1/f), 6, 25)); }
    document.getElementById('zoomRange').oninput = (e) => camera.position.setLength(e.target.value);
    document.getElementById('cfgLabels').onchange = (e) => state.labels = e.target.checked;
    document.querySelectorAll('input[type="color"]').forEach(i => i.oninput = updateVisuals);
    window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };

    init();
</script>
</body>
</html>
