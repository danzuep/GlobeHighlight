<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Mapper Pro</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --accent: #d4af37; --bg: #ffffff; --panel: #f9f9f9; }
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: var(--bg); touch-action: none; }
        
        /* Loading Spinner */
        #loader {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            background: white; z-index: 100; transition: opacity 0.5s;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #eee; border-top-color: var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Map Area */
        #container { width: 100vw; height: 100vh; cursor: grab; }
        #container:active { cursor: grabbing; }

        /* Bottom Panel */
        #config-panel {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel);
            box-shadow: 0 -2px 20px rgba(0,0,0,0.1); border-radius: 20px 20px 0 0;
            transform: translateY(calc(100% - 40px)); transition: transform 0.3s ease; z-index: 50;
        }
        #config-panel.open { transform: translateY(0); }
        .drag-handle { 
            height: 40px; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; font-weight: bold; color: #888;
        }
        .panel-content {
            padding: 20px; max-height: 60vh; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;
        }

        /* UI Elements */
        .control-group { display: flex; flex-direction: column; gap: 5px; font-size: 12px; }
        button { padding: 8px; cursor: pointer; border: 1px solid #ddd; background: white; border-radius: 4px; }
        .export-area { grid-column: 1 / -1; display: flex; gap: 10px; margin-top: 10px; }
        
        #country-list-container { 
            grid-column: 1 / -1; border-top: 1px solid #ddd; padding-top: 10px; 
            font-size: 13px; max-height: 150px; overflow-y: auto;
        }
        ol { column-count: 2; margin: 0; padding-left: 20px; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div id="container">
    <svg id="globe"></svg>
</div>

<div id="config-panel">
    <div class="drag-handle" onclick="document.getElementById('config-panel').classList.toggle('open')">
        ▲ SETTINGS & LIST
    </div>
    <div class="panel-content">
        <div class="control-group">
            <label>Background Color</label>
            <input type="color" id="bgColor" value="#ffffff">
            <label>Highlight Color</label>
            <input type="color" id="highlightColor" value="#d4af37">
        </div>
        <div class="control-group">
            <label>Line Color & Width</label>
            <input type="color" id="lineColor" value="#c0c0c0">
            <input type="range" id="lineWidth" min="0.1" max="2" step="0.1" value="0.5">
        </div>
        <div class="control-group">
            <label><input type="checkbox" id="showLabels"> Local Names</label>
            <input type="range" id="fontSize" min="6" max="20" value="10">
            <input type="color" id="textColor" value="#333333">
        </div>
        <div class="control-group">
            <button onclick="resetAll()">Reset All Data</button>
            <button onclick="copyMarkdown()">Export Markdown</button>
            <button onclick="importMarkdown()">Import Markdown</button>
        </div>

        <div id="country-list-container">
            <strong>Selected:</strong>
            <ol id="country-list"></ol>
        </div>
    </div>
</div>

<script>
    let width = window.innerWidth;
    let height = window.innerHeight;
    let selectedCountries = new Set();
    let worldData;
    let rotationTimer;
    let velocity = [0.1, 0.05]; // Initial slow drift

    const projection = d3.geoOrthographic()
        .scale(Math.min(width, height) / 2.5)
        .translate([width / 2, height / 2])
        .rotate([0, -10]);

    const path = d3.geoPath().projection(projection);
    const svg = d3.select("#globe").attr("width", width).attr("height", height);
    const g = svg.append("g");

    // Settings state
    let settings = {
        bgColor: "#ffffff",
        highlightColor: "#d4af37",
        lineColor: "#c0c0c0",
        lineWidth: 0.5,
        textColor: "#333333",
        showLabels: false,
        fontSize: 10
    };

    // --- Core Logic ---

    async function init() {
        try {
            const response = await fetch("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson");
            worldData = await response.json();
            
            loadState();
            setupInteractions();
            startInertia();
            
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 500);
            
            render();
        } catch (e) { console.error("Data load failed", e); }
    }

    function render() {
        d3.select("body").style("background-color", settings.bgColor);
        
        const countries = g.selectAll(".country")
            .data(worldData.features)
            .join("path")
            .attr("class", "country")
            .attr("d", path)
            .attr("fill", d => selectedCountries.has(d.properties.name) ? settings.highlightColor : "transparent")
            .attr("stroke", settings.lineColor)
            .attr("stroke-width", settings.lineWidth)
            .attr("pointer-events", "all")
            .on("click", (e, d) => {
                const name = d.properties.name;
                selectedCountries.has(name) ? selectedCountries.delete(name) : selectedCountries.add(name);
                saveState();
                render();
            });

        g.selectAll(".label").remove();
        if (settings.showLabels) {
            g.selectAll(".label")
                .data(worldData.features)
                .join("text")
                .attr("class", "label")
                .attr("transform", d => `translate(${path.centroid(d)})`)
                .text(d => d.properties.name)
                .attr("font-size", `${settings.fontSize}px`)
                .attr("fill", settings.textColor)
                .attr("text-anchor", "middle")
                .style("display", d => {
                    const center = projection.invert([width/2, height/2]);
                    return d3.geoDistance(d3.geoCentroid(d), center) > Math.PI / 2 ? "none" : "block";
                });
        }

        updateList();
    }

    // --- Movement & Zoom ---

    function setupInteractions() {
        // Drag + Inertia logic
        const drag = d3.drag()
            .on("start", () => { velocity = [0, 0]; rotationTimer.stop(); })
            .on("drag", (event) => {
                const rotate = projection.rotate();
                const k = 75 / projection.scale();
                velocity = [event.dx * k, -event.dy * k];
                projection.rotate([rotate[0] + velocity[0], rotate[1] + velocity[1]]);
                render();
            })
            .on("end", startInertia);

        // Zoom logic (Pinch & Scroll)
        const zoom = d3.zoom()
            .scaleExtent([100, 2000])
            .on("zoom", (event) => {
                projection.scale(event.transform.k);
                render();
            });

        svg.call(drag).call(zoom).call(zoom.transform, d3.zoomIdentity.translate(0,0).scale(projection.scale()));

        // Bind UI
        ["bgColor", "highlightColor", "lineColor", "lineWidth", "textColor", "fontSize"].forEach(id => {
            document.getElementById(id).oninput = (e) => {
                settings[id] = e.target.value;
                saveState();
                render();
            };
        });
        document.getElementById("showLabels").onchange = (e) => {
            settings.showLabels = e.target.checked;
            saveState();
            render();
        };
    }

    function startInertia() {
        if (rotationTimer) rotationTimer.stop();
        rotationTimer = d3.timer(() => {
            const rotate = projection.rotate();
            projection.rotate([rotate[0] + velocity[0], rotate[1] + velocity[1]]);
            velocity[0] *= 0.98; // Friction
            velocity[1] *= 0.98;
            render();
            if (Math.abs(velocity[0]) < 0.01 && Math.abs(velocity[1]) < 0.01) {
                // Keep a tiny "earth drift" alive
                velocity = [0.02, 0];
            }
        });
    }

    // --- State & Markdown ---

    function saveState() {
        const data = {
            selected: Array.from(selectedCountries),
            settings: settings,
            rotation: projection.rotate(),
            scale: projection.scale()
        };
        localStorage.setItem("world_map_session", JSON.stringify(data));
    }

    function loadState() {
        const raw = localStorage.getItem("world_map_session");
        if (!raw) return;
        const data = JSON.parse(raw);
        selectedCountries = new Set(data.selected);
        settings = data.settings;
        projection.rotate(data.rotation).scale(data.scale);
        
        // Sync Inputs
        Object.keys(settings).forEach(k => {
            const el = document.getElementById(k);
            if (el) el.type === "checkbox" ? el.checked = settings[k] : el.value = settings[k];
        });
    }

    function resetAll() {
        localStorage.clear();
        // Clear cookies just in case
        document.cookie.split(";").forEach(c => {
            document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
        });
        location.reload();
    }

    function updateList() {
        const list = document.getElementById("country-list");
        list.innerHTML = "";
        Array.from(selectedCountries).sort().forEach(n => {
            const li = document.createElement("li");
            li.textContent = n;
            list.appendChild(li);
        });
    }

    function copyMarkdown() {
        const text = "### Selected Countries\n" + Array.from(selectedCountries).sort().map(c => `* [x] ${c}`).join("\n");
        navigator.clipboard.writeText(text);
        alert("Markdown copied to clipboard!");
    }

    function importMarkdown() {
        const input = prompt("Paste Markdown list here:");
        if (!input) return;
        const matches = input.match(/\[x\] (.*)/g);
        if (matches) {
            matches.forEach(m => selectedCountries.add(m.replace("[x] ", "").trim()));
            saveState();
            render();
        }
    }

    init();
</script>
</body>
</html>
