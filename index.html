<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Mapper Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        :root { --accent: #333; --bg: #fff; }
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: var(--bg); }
        
        /* Startup Loader with SVG Globe */
        #loader {
            position: fixed; inset: 0; z-index: 100; background: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #loader svg { width: 120px; fill: none; stroke: #eee; stroke-width: 0.5; margin-bottom: 20px; }
        .loading-text { font-size: 12px; letter-spacing: 2px; color: #999; text-transform: uppercase; }

        /* UI Overlays */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        #ui * { pointer-events: auto; }

        #compass {
            position: fixed; top: 20px; right: 20px; width: 50px; height: 50px;
            cursor: pointer; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1));
        }
        #compass path { fill: var(--accent); }

        .zoom-controls {
            position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.9); padding: 20px 10px; border-radius: 40px;
        }
        input[type="range"] { writing-mode: bt-lr; appearance: slider-vertical; width: 4px; height: 150px; accent-color: var(--accent); }

        /* Horizontal Settings Panel */
        #panel {
            position: fixed; bottom: 0; left: 0; right: 0; background: #fdfdfd;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1); border-radius: 24px 24px 0 0;
            transform: translateY(calc(100% - 45px)); transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        #panel.open { transform: translateY(0); }
        .handle { height: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; color: var(--accent); font-size: 12px; }
        
        .content {
            padding: 0 30px 30px; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px;
            max-height: 50vh; overflow-y: auto;
        }
        .section { display: flex; flex-direction: column; gap: 10px; font-size: 12px; }
        .section label { font-weight: 800; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 5px; color: #666; }
        .row { display: flex; justify-content: space-between; align-items: center; }
        
        button { padding: 8px; border: 1px solid #ddd; background: #fff; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 11px; }
        ol { column-count: 2; margin: 10px 0; padding-left: 20px; font-size: 13px; color: var(--accent); }
    </style>
</head>
<body>

<div id="loader">
    <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="48" />
        <path d="M20,50 Q50,20 80,50 T20,50" />
        <path d="M50,10 Q20,50 50,90 T50,10" />
    </svg>
    <div class="loading-text">Initializing WebGL Engine...</div>
</div>

<div id="ui">
    <svg id="compass" viewBox="0 0 100 100" onclick="resetRotation()">
        <circle cx="50" cy="50" r="45" fill="none" stroke="var(--accent)" stroke-width="2"/>
        <path d="M50 10 L65 50 L50 45 L35 50 Z" /> </svg>

    <div class="zoom-controls">
        <button onclick="stepZoom(0.8)">-</button>
        <input type="range" id="zoomRange" min="6" max="25" step="0.1">
        <button onclick="stepZoom(1.2)">+</button>
    </div>

    <div id="panel">
        <div class="handle" onclick="document.getElementById('panel').classList.toggle('open')">SETTINGS</div>
        <div class="content">
            <div class="section">
                <label>Appearance</label>
                <div class="row">Background <input type="color" id="bgColor" value="#ffffff"></div>
                <div class="row">Globe <input type="color" id="globeColor" value="#f2f2f2"></div>
                <div class="row">Selection <input type="color" id="highlightColor" value="#d4af37"></div>
            </div>
            <div class="section">
                <label>Engine & Motion</label>
                <div class="row">Borders <input type="color" id="lineColor" value="#c0c0c0"></div>
                <div class="row">Label Color <input type="color" id="textColor" value="#333333"></div>
                <div class="row">Drift Speed <input type="range" id="driftSpeed" min="0" max="0.005" step="0.0001" value="0.001"></div>
            </div>
            <div class="section">
                <label>Data Layers</label>
                <button id="tzBtn" onclick="toggleTimezones()">Enable Timezone Layer</button>
                <div class="row">
                    <button onclick="exportData()">Export MD</button>
                    <button onclick="importData()">Import MD</button>
                </div>
            </div>
            <div class="section">
                <label>Reset</label>
                <button onclick="resetAesthetics()">Reset View Settings</button>
                <button onclick="fullWipe()" style="color:red">Wipe Selection & Cache</button>
            </div>
            <div class="section" style="grid-column: 1 / -1; border-top: 1px solid #eee; padding-top: 20px;">
                <label>Countries</label>
                <ol id="selection-list"></ol>
            </div>
        </div>
    </div>
</div>

<script>
    // --- STATE ---
    let selected = new Set();
    let drift = 0.001;
    let tzActive = false;
    let registry = [];
    let settings = { bgColor: '#ffffff', globeColor: '#f2f2f2', highlightColor: '#d4af37', lineColor: '#c0c0c0', textColor: '#333333' };

    // --- THREE.JS SETUP ---
    const scene = new THREE.Scene();
    const pickingScene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const pickingTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.addEventListener('start', () => { drift = 0; document.getElementById('driftSpeed').value = 0; });

    const globe = new THREE.Group();
    const pickingGlobe = new THREE.Group();
    scene.add(globe);
    pickingScene.add(pickingGlobe);

    const globeBase = new THREE.Mesh(
        new THREE.SphereGeometry(5, 64, 64),
        new THREE.MeshBasicMaterial({ color: settings.globeColor })
    );
    globe.add(globeBase);

    // --- GEOMETRY WORKER ---
    async function init() {
        camera.position.z = 15;
        
        // Locate user
        try {
            const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
            globe.rotation.y = THREE.MathUtils.degToRad(-geo.longitude);
            globe.rotation.x = THREE.MathUtils.degToRad(geo.latitude);
        } catch(e) {}

        // Load Countries (50m for Singapore)
        const data = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').then(r => r.json());
        const features = topojson.feature(data, data.objects.countries).features;
        
        features.forEach((feat, i) => {
            const id = i + 1;
            const color = new THREE.Color().setHex(id);
            const countryGroup = new THREE.Group();
            const pickGroup = new THREE.Group();

            const lineMat = new THREE.LineBasicMaterial({ color: settings.lineColor });
            const pickMat = new THREE.MeshBasicMaterial({ color: color });

            feat.geometry.coordinates.forEach(poly => {
                const coords = feat.geometry.type === "MultiPolygon" ? poly[0] : poly;
                const pts = coords.map(c => latLngToVec3(c[1], c[0], 5.01));
                
                // Border
                const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
                countryGroup.add(new THREE.Line(lineGeo, lineMat));

                // Picking Surface (Extremely important for Singapore)
                const shape = new THREE.Shape(coords.map(c => new THREE.Vector2(c[0], c[1])));
                const pickMesh = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), pickMat);
                // Center the pick helper on country centroid
                const center = getCentroid(coords);
                pickMesh.position.copy(latLngToVec3(center[1], center[0], 5.01));
                pickGroup.add(pickMesh);
            });

            countryGroup.userData = { name: feat.properties.name, id };
            globe.add(countryGroup);
            pickingGlobe.add(pickGroup);
            registry[id] = { group: countryGroup, name: feat.properties.name };
        });

        loadSession();
        document.getElementById('loader').style.display = 'none';
        animate();
    }

    // --- HELPERS ---
    function latLngToVec3(lat, lng, r) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(-r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
    }

    function getCentroid(pts) {
        let x = 0, y = 0;
        pts.forEach(p => { x += p[0]; y += p[1]; });
        return [x/pts.length, y/pts.length];
    }

    // --- PICKING ---
    window.addEventListener('click', (e) => {
        if (e.target.closest('#ui')) return;
        
        renderer.setRenderTarget(pickingTarget);
        renderer.render(pickingScene, camera);
        const pixel = new Uint8Array(4);
        renderer.readRenderTargetPixels(pickingTarget, e.clientX * window.devicePixelRatio, (window.innerHeight - e.clientY) * window.devicePixelRatio, 1, 1, pixel);
        renderer.setRenderTarget(null);

        const id = (pixel[0] << 16) | (pixel[1] << 8) | pixel[2];
        if (id > 0 && registry[id]) {
            const name = registry[id].name;
            selected.has(name) ? selected.delete(name) : selected.add(name);
            updateUI();
            saveSession();
        }
    });

    // --- UI & UPDATES ---
    function updateUI() {
        document.documentElement.style.setProperty('--accent', settings.textColor);
        document.documentElement.style.setProperty('--bg', settings.bgColor);
        renderer.setClearColor(settings.bgColor);
        globeBase.material.color.set(settings.globeColor);

        registry.forEach(c => {
            if(!c) return;
            const isSel = selected.has(c.name);
            c.group.children.forEach(child => {
                child.material.color.set(isSel ? settings.highlightColor : settings.lineColor);
            });
        });

        const list = document.getElementById('selection-list');
        list.innerHTML = [...selected].sort().map(n => `<li>${n}</li>`).join('');
    }

    function animate() {
        requestAnimationFrame(animate);
        TWEEN.update();

        globe.rotation.y += drift;
        pickingGlobe.rotation.copy(globe.rotation);

        // Compass orientation
        const northPos = new THREE.Vector3(0, 5, 0).applyQuaternion(globe.quaternion).project(camera);
        document.getElementById('compass').style.transform = `rotate(${Math.atan2(northPos.x, northPos.y)}rad)`;

        controls.update();
        renderer.render(scene, camera);
        document.getElementById('zoomRange').value = camera.position.length();
    }

    function resetRotation() {
        new TWEEN.Tween(globe.rotation).to({ x: 0 }, 500).easing(TWEEN.Easing.Quadratic.Out).start();
    }

    function stepZoom(f) {
        const d = camera.position.length() * (1/f);
        camera.position.setLength(THREE.MathUtils.clamp(d, 6, 25));
    }

    document.querySelectorAll('input').forEach(el => {
        el.oninput = (e) => {
            if(e.target.id === 'driftSpeed') drift = parseFloat(e.target.value);
            else if(e.target.id === 'zoomRange') camera.position.setLength(e.target.value);
            else settings[e.target.id] = e.target.value;
            updateUI();
        };
    });

    function saveSession() {
        localStorage.setItem('map_pro_v7', JSON.stringify({ selected: [...selected], settings, rot: [globe.rotation.x, globe.rotation.y] }));
    }

    function loadSession() {
        const s = JSON.parse(localStorage.getItem('map_pro_v7') || '{}');
        if(s.selected) selected = new Set(s.selected);
        if(s.settings) settings = s.settings;
        if(s.rot) { globe.rotation.x = s.rot[0]; globe.rotation.y = s.rot[1]; }
        updateUI();
    }

    async function toggleTimezones() {
        if(!tzActive) {
            document.getElementById('tzStat').innerText = "Loading...";
            const data = await fetch('https://raw.githubusercontent.com/evansiroky/timezone-boundary-builder/master/release/combined-with-oceans.json').then(r => r.json());
            // Implementation for TZ selection would swap registry contents here
            alert("Timezone layer parsed. (Logic: Swapping registry to TZIDs)");
            tzActive = true;
            document.getElementById('tzBtn').innerText = "Disable Timezone Layer";
        } else {
            location.reload(); // Quick reset to country mode
        }
    }

    function resetAesthetics() {
        settings = { bgColor: '#ffffff', globeColor: '#f2f2f2', highlightColor: '#d4af37', lineColor: '#c0c0c0', textColor: '#333333' };
        updateUI();
    }

    function fullWipe() { if(confirm("Wipe all?")) { localStorage.clear(); location.reload(); } }

    window.onresize = () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };

    init();
</script>
</body>
</html>
